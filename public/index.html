<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Blue Ferret — Адмінка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --acc:#009fe3;--acc-h:#0077b3;--acc-m:rgba(0,159,227,.12);
  --kik:#4bb272;--kik-h:#3a9960;--kik-m:rgba(75,178,114,.12);
  --bg:#f1f5f9;--card:#fff;
  --dark:#0f172a;--dark-8:#1e293b;--dark-7:#334155;
  --border:rgba(15,23,42,.1);--border-s:rgba(15,23,42,.06);
  --txt:#1e293b;--muted:#64748b;
  --red:#e11d48;--green:#16a34a;
  --sb:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Comfortaa',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
a{color:var(--acc)}
.hidden{display:none!important}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:var(--dark);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 80%,rgba(0,159,227,.18) 0%,transparent 55%),
    radial-gradient(ellipse 70% 40% at 80% 20%,rgba(75,178,114,.14) 0%,transparent 55%)}
.login-box{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:40px;
  width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.45)}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:24px}
.login-dot{width:36px;height:36px;border-radius:11px;background:var(--acc);flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,159,227,.4)}
.login-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;line-height:1.2}
.login-title small{display:block;font-family:'Comfortaa',sans-serif;font-size:11px;
  color:rgba(255,255,255,.4);font-weight:400;margin-top:2px;letter-spacing:.04em}
.login-sub{color:rgba(255,255,255,.45);font-size:13px;text-align:center;margin-bottom:28px}
.login-box label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:7px}
.login-box input{width:100%;padding:13px 15px;border:1.5px solid rgba(255,255,255,.14);border-radius:12px;
  font-family:'Comfortaa',sans-serif;font-size:14px;background:rgba(255,255,255,.08);color:#fff;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,159,227,.22)}
.login-box input::placeholder{color:rgba(255,255,255,.28)}
.login-btn{width:100%;margin-top:18px;background:var(--acc);color:#fff;border:none;
  padding:14px;border-radius:12px;font-family:'Comfortaa',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,159,227,.35)}
.login-btn:hover{background:var(--acc-h);box-shadow:0 6px 20px rgba(0,159,227,.45)}
.login-btn:disabled{opacity:.5;cursor:default}
.login-err{color:#f87171;font-size:13px;text-align:center;margin-top:14px}

/* ── Shell ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:var(--sb);flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.05);overflow-y:auto}
.sb-brand{padding:18px 16px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sb-dot{width:30px;height:30px;border-radius:9px;background:var(--acc);flex-shrink:0;
  box-shadow:0 3px 12px rgba(0,159,227,.4)}
.sb-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.sb-name small{display:block;font-family:'Comfortaa',sans-serif;font-size:10px;
  color:rgba(255,255,255,.35);font-weight:400;letter-spacing:.04em}
.sb-nav{padding:10px 8px;flex:1}
.sb-group-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.28);padding:14px 12px 5px}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.5);font-family:'Comfortaa',sans-serif;font-size:13px;font-weight:600;
  transition:.15s;border:none;background:none;width:100%;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.82)}
.sb-btn.active{background:rgba(0,159,227,.16);color:var(--acc)}
.sb-btn svg{flex-shrink:0;opacity:.65}
.sb-btn.active svg{opacity:1}
.sb-footer{padding:10px 8px 16px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sb-site-link{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;
  color:rgba(255,255,255,.4);font-size:12.5px;font-family:'Comfortaa',sans-serif;
  text-decoration:none;transition:.15s}
.sb-site-link:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.sb-logout{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.4);font-size:13px;font-family:'Comfortaa',sans-serif;font-weight:600;
  transition:.15s;border:none;background:none;width:100%;text-align:left}
.sb-logout:hover{background:rgba(239,68,68,.14);color:#f87171}

/* ── Main area ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.main-topbar{position:sticky;top:0;z-index:10;background:rgba(241,245,249,.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:13px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.breadcrumb b{color:var(--txt);font-weight:700}
.breadcrumb svg{opacity:.35}
.topbar-right{display:flex;align-items:center;gap:12px}
.saved-stamp{font-size:12px;color:var(--muted)}
.main-body{padding:28px;max-width:920px;width:100%}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;
  margin-bottom:20px;box-shadow:0 1px 4px rgba(15,23,42,.04)}
.card-head{margin-bottom:20px}
.card-head h2{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;color:var(--dark-8)}
.card-head p{margin-top:5px;color:var(--muted);font-size:12.5px}

/* ── Form ── */
.field{margin-bottom:16px}
.field>label,.field-label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--dark-7);margin-bottom:7px}
.field .note{display:block;font-size:11.5px;color:var(--muted);margin-top:5px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>.field{flex:1;min-width:170px}

input[type=text],input[type=url],input[type=email],input[type=password],
input[type=number],input[type=date],textarea,select{
  width:100%;padding:11px 13px;
  border:1.5px solid rgba(15,23,42,.13);border-radius:10px;
  font-family:'Comfortaa',sans-serif;font-size:13.5px;
  background:#fff;color:var(--txt);transition:.15s;outline:none}
input:focus,textarea:focus,select:focus{
  border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-m)}
textarea{min-height:100px;resize:vertical;
  font-family:ui-monospace,'Menlo','Consolas',monospace;font-size:12.5px}
.switch-row{display:flex;align-items:center;gap:10px}
.switch-input{width:44px;height:25px;background:#cbd5e1;border-radius:99px;
  position:relative;cursor:pointer;appearance:none;border:none;transition:.2s;flex-shrink:0}
.switch-input:checked{background:var(--acc)}
.switch-input::after{content:"";position:absolute;top:2.5px;left:2.5px;
  width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;
  box-shadow:0 1px 3px rgba(0,0,0,.22)}
.switch-input:checked::after{left:21.5px}
.switch-label{font-size:13.5px;font-weight:600;cursor:pointer;user-select:none}
.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type=color]{width:44px;height:40px;padding:3px;
  border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;flex-shrink:0}
.color-row input[type=text]{max-width:140px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;padding:11px 20px;
  border-radius:10px;font-family:'Comfortaa',sans-serif;font-size:13.5px;font-weight:700;
  cursor:pointer;transition:.15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--acc);color:#fff;box-shadow:0 3px 12px rgba(0,159,227,.28)}
.btn-primary:hover{background:var(--acc-h);box-shadow:0 4px 16px rgba(0,159,227,.38)}
.btn-ghost{background:#fff;color:var(--txt);border:1.5px solid rgba(15,23,42,.14)}
.btn-ghost:hover{border-color:rgba(15,23,42,.24);background:#f8fafc}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c01040}
.btn-kik{background:var(--kik);color:#fff}
.btn-kik:hover{background:var(--kik-h)}
.btn-sm{padding:7px 14px;font-size:12.5px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:default!important}

/* ── Table / List ── */
.list-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.list-header h2{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;color:var(--dark-8)}
.list-header p{font-size:12px;color:var(--muted);margin-top:3px}
.list-tbl{width:100%;border-collapse:collapse;font-size:13px}
.list-tbl th{text-align:left;padding:9px 12px;border-bottom:2px solid var(--border);
  color:var(--muted);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.list-tbl td{padding:12px;border-bottom:1px solid var(--border-s);vertical-align:middle}
.list-tbl tbody tr:last-child td{border:none}
.list-tbl tbody tr:hover td{background:#f8fafc}
.thumb{width:50px;height:50px;object-fit:cover;border-radius:10px;
  background:var(--bg);border:1px solid var(--border-s)}
.badge{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-published,.badge-active{background:rgba(22,163,74,.12);color:#15803d}
.badge-draft{background:rgba(234,179,8,.11);color:#a16207}
.badge-archived,.badge-ended,.badge-paused{background:rgba(100,116,139,.1);color:var(--muted)}
.prog{height:6px;background:rgba(15,23,42,.08);border-radius:99px;overflow:hidden;margin-top:6px}
.prog span{display:block;height:100%;background:var(--kik);border-radius:99px;transition:.3s}

/* ── Upload zone ── */
.upload-zone{border:2px dashed rgba(0,159,227,.3);border-radius:12px;padding:20px;
  text-align:center;cursor:pointer;transition:.2s;color:var(--muted);font-size:13px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:var(--acc-m)}
.upload-zone input[type=file]{display:none}
.cover-preview{max-width:150px;max-height:100px;border-radius:10px;margin-top:10px;
  object-fit:cover;display:block;border:1px solid var(--border)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:100;
  display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;
  backdrop-filter:blur(5px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:680px;
  box-shadow:0 40px 80px rgba(0,0,0,.22);padding:32px;margin:auto}
.modal h3{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;
  color:var(--dark-8);margin-bottom:24px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;
  padding-top:18px;border-top:1px solid var(--border)}

/* ── Toast ── */
.toast{position:fixed;right:20px;bottom:20px;background:var(--dark-8);color:#fff;
  padding:13px 20px;border-radius:12px;font-size:13px;font-weight:600;
  opacity:0;transform:translateY(10px);transition:.25s;z-index:200;
  box-shadow:0 8px 28px rgba(0,0,0,.22);pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast.err{background:var(--red)}

/* ── Audit ── */
.audit-tbl{width:100%;border-collapse:collapse;font-size:12px}
.audit-tbl td{padding:8px 10px;border-bottom:1px solid var(--border-s);color:var(--muted);vertical-align:top}
.audit-tbl td:first-child{white-space:nowrap;color:var(--txt);font-size:11.5px}
code{background:rgba(0,159,227,.1);color:var(--acc);padding:2px 7px;border-radius:6px;font-size:11.5px}
.sec-divider{height:1px;background:var(--border-s);margin:20px 0}

/* ── Responsive ── */
@media(max-width:700px){
  .sidebar{display:none}
  .main-body{padding:16px}
  .row{flex-direction:column}
  .modal{padding:20px;border-radius:16px}
  .main-topbar{padding:12px 16px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap">
  <form id="loginForm" class="login-box">
    <div class="login-logo">
      <div class="login-dot"></div>
      <div class="login-title">Blue Ferret<small>Панель керування</small></div>
    </div>
    <p class="login-sub">Введіть пароль адміністратора</p>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="pw" autocomplete="current-password" required autofocus placeholder="••••••••">
    </div>
    <button type="submit" class="login-btn" id="loginBtn">Увійти</button>
    <p id="loginErr" class="login-err hidden"></p>
  </form>
</div>

<!-- APP -->
<div id="app" class="shell hidden">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-dot"></div>
      <div class="sb-name">Blue Ferret<small>CMS</small></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-footer">
      <a class="sb-site-link" href="/" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
        </svg>
        Відкрити сайт
      </a>
      <button class="sb-logout" id="logoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Вийти
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="main-topbar">
      <div class="breadcrumb">
        <span>Blue Ferret</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 18l6-6-6-6"/>
        </svg>
        <b id="pageTitle">Загальне</b>
      </div>
      <div class="topbar-right" id="topbarRight">
        <span class="saved-stamp" id="savedAt"></span>
        <button class="btn btn-primary btn-sm" id="saveBtn">Зберегти і опублікувати</button>
      </div>
    </div>
    <div class="main-body" id="panels"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="modalCancel">Скасувати</button>
      <button class="btn btn-danger btn-sm hidden" id="modalDelete">Видалити</button>
      <button class="btn btn-primary btn-sm" id="modalSave">Зберегти</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

const $ = (s, r = document) => r.querySelector(s);
let S = null, activeTab = 'general';
let gamesCache = [], kikCache = [];
let editingType = null, editingId = null;

// ── Sidebar nav config ──────────────────────────────────────────
const NAV = [
  { group: 'Сайт' },
  { id: 'general', label: 'Загальне', icon: '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>' },
  { id: 'homepage', label: 'Головна сторінка', icon: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
  { id: 'banner', label: 'Банер', icon: '<rect x="3" y="5" width="18" height="4" rx="1"/><rect x="3" y="13" width="18" height="8" rx="1"/>' },
  { id: 'maintenance', label: 'Тех. режим', icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' },
  { id: 'contacts', label: 'Контакти', icon: '<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.64A2 2 0 012 .98h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>' },
  { group: 'Контент' },
  { id: 'games', label: 'Ігри', icon: '<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>' },
  { id: 'kik', label: 'КІК-проекти', icon: '<path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>' },
  { group: 'Просунуте' },
  { id: 'seo', label: 'SEO', icon: '<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>' },
  { id: 'integrations', label: 'Аналітика', icon: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>' },
  { id: 'appearance', label: 'Кастомний CSS', icon: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>' },
  { group: 'Система' },
  { id: 'audit', label: 'Журнал дій', icon: '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>' },
];

const SETTINGS_TABS = new Set(['general','homepage','banner','maintenance','contacts','seo','integrations','appearance']);

// ── Utils ──────────────────────────────────────────────────────
function esc(x){return String(x??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg, isErr){
  const t = $('#toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 2800);
}
async function api(method, url, body){
  const r = await fetch(url, {
    method,
    headers: body ? {'Content-Type':'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 401){ showLogin(); throw new Error('unauth'); }
  return r.json();
}

// ── Sidebar render ─────────────────────────────────────────────
function renderSidebar(){
  $('#sbNav').innerHTML = NAV.map(item => {
    if (item.group) return `<div class="sb-group-label">${item.group}</div>`;
    return `<button class="sb-btn${item.id===activeTab?' active':''}" data-tab="${item.id}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${item.icon}</svg>
      ${item.label}
    </button>`;
  }).join('');
  $('#pageTitle').textContent = NAV.find(n=>n.id===activeTab)?.label || '';
}

$('#sbNav' in document ? '#sbNav' : 'body').addEventListener('click', e => {
  const b = e.target.closest('[data-tab]');
  if (b) switchTab(b.dataset.tab);
});
document.addEventListener('click', e => {
  const b = e.target.closest('[data-tab]');
  if (b && $('#sbNav').contains(b)) switchTab(b.dataset.tab);
});

function switchTab(id){
  activeTab = id;
  const isSettings = SETTINGS_TABS.has(id);

// ── Field helpers ──────────────────────────────────────────────
function field(label, note, inner){
  return `<div class="field"><label>${label}</label>${note?`<span class="note" style="margin-bottom:6px;display:block">${note}</span>`:''} ${inner}</div>`;
}
function input(path, val, type='text', ph=''){
  return `<input type="${type}" data-path="${path}" value="${esc(val)}" placeholder="${ph}">`;
}
function textarea(path, val, ph=''){
  return `<textarea data-path="${path}" placeholder="${ph}">${esc(val)}</textarea>`;
}
function toggle(path, val, lbl){
  return `<div class="switch-row"><input type="checkbox" class="switch-input" data-path="${path}"${val?' checked':''}><label class="switch-label">${lbl}</label></div>`;
}
function colorField(path, val){
  return `<div class="color-row"><input type="color" data-path="${path}" value="${val||'#009fe3'}"><input type="text" data-path="${path}" value="${esc(val)}"></div>`;
}
function selField(path, val, opts){
  return `<select data-path="${path}">${opts.map(o=>`<option value="${o.v}"${o.v===val?' selected':''}>${o.l}</option>`).join('')}</select>`;
}
function card(title, hint, body){
  return `<div class="card"><div class="card-head"><h2>${title}</h2>${hint?`<p>${hint}</p>`:''}</div>${body}</div>`;
}

// ── Collect settings from DOM ──────────────────────────────────
function collectSettings(){
  document.querySelectorAll('[data-path]').forEach(el => {
    const parts = el.dataset.path.split('.');
    const [k, f] = parts;
    if (!S[k]) S[k] = {};
    if (el.type === 'checkbox') S[k][f] = el.checked;
    else S[k][f] = el.value;
  });
}

function setupUploadZone(){
  const zone = $('#uploadZone');
  const fileInput = $('#mf_file');
  if (!zone || !fileInput) return;
  fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
  });
}

async function uploadFile(file){
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const r = await api('POST', '/api/admin/upload', { filename: file.name, data: e.target.result });
      if (r.url){ $('#mf_cover_url').value = r.url; showCoverPreview(r.url); toast('Завантажено ✓'); }
      else toast('Помилка завантаження', true);
    } catch(_){ toast('Помилка завантаження', true); }
  };
  reader.readAsDataURL(file);
}

function showCoverPreview(url){
  let p = $('#coverPreview');
  if (p){ p.src = url; p.className = 'cover-preview'; p.tagName !== 'IMG' && (p.outerHTML = `<img class="cover-preview" id="coverPreview" src="${esc(url)}">`); }
}

// ── Modal save / delete ────────────────────────────────────────
async function modalSave(){
  $('#modalSave').disabled = true;
  try {
    if (editingType === 'game'){
      const body = {
        title: $('#mf_title').value, slug: $('#mf_slug').value,
        subtitle: $('#mf_subtitle').value, description: $('#mf_description').value,
        status: $('#mf_status').value, cover_url: $('#mf_cover_url').value,
        players: $('#mf_players').value, age: $('#mf_age').value,
        duration: $('#mf_duration').value, buy_url: $('#mf_buy_url').value,
        sort_order: Number($('#mf_sort_order').value)||0,
      };
      if (!body.title){ toast('Назва обов\'язкова', true); return; }
      if (editingId) await api('PUT',`/api/admin/games/${editingId}`,body);
      else await api('POST','/api/admin/games',body);
      gamesCache = await api('GET','/api/admin/games');
      toast(editingId ? 'Гру оновлено ✓' : 'Гру додано ✓');
    } else {
      const endsRaw = $('#mf_ends_at').value;
      const body = {
        title: $('#mf_title').value, subtitle: $('#mf_subtitle').value,
        description: $('#mf_description').value, status: $('#mf_status').value,
        goal: Number($('#mf_goal').value)||0, raised: Number($('#mf_raised').value)||0,
        backers: Number($('#mf_backers').value)||0,
        cover_url: $('#mf_cover_url').value, campaign_url: $('#mf_campaign_url').value,
        ends_at: endsRaw ? new Date(endsRaw).getTime() : null,
        sort_order: Number($('#mf_sort_order').value)||0,
      };
      if (!body.title){ toast('Назва обов\'язкова', true); return; }
      if (editingId) await api('PUT',`/api/admin/kik/${editingId}`,body);
      else await api('POST','/api/admin/kik',body);
      kikCache = await api('GET','/api/admin/kik');
      toast(editingId ? 'Проект оновлено ✓' : 'Проект додано ✓');
    }
    closeModal(); draw();
  } catch(e){ if (e.message !== 'unauth') toast('Помилка: ' + e.message, true); }
  finally { $('#modalSave').disabled = false; }
}

async function modalDelete(){
  if (!editingId || !confirm('Видалити назавжди?')) return;
  try {
    if (editingType === 'game'){
      await api('DELETE',`/api/admin/games/${editingId}`);
      gamesCache = await api('GET','/api/admin/games');
    } else {
      await api('DELETE',`/api/admin/kik/${editingId}`);
      kikCache = await api('GET','/api/admin/kik');
    }
    toast('Видалено'); closeModal(); draw();
  } catch(e){ if (e.message !== 'unauth') toast('Помилка', true); }
}

function closeModal(){
  $('#modalBg').classList.add('hidden');
  editingType = null; editingId = null;
}

// ── Draw ───────────────────────────────────────────────────────
function draw(){
  const isSettings = SETTINGS_TABS.has(activeTab);
  if (isSettings){
    $('#panels').innerHTML = renderSettings(activeTab) || '';
  } else if (activeTab === 'games'){
    $('#panels').innerHTML = renderGames();
  } else if (activeTab === 'kik'){
    $('#panels').innerHTML = renderKik();
  } else if (activeTab === 'audit'){
    $('#panels').innerHTML = `<div class="card"><div class="card-head"><h2>Журнал дій</h2><p>Останні 100 записів</p></div><div id="auditBox" style="color:var(--muted);font-size:13px">Завантаження…</div></div>`;
    loadAudit();
  }
  // Sync color pickers
  document.querySelectorAll('[data-path]').forEach(el => {
    if (el.type === 'color'){
      const pair = document.querySelector(`input[type=text][data-path="${el.dataset.path}"]`);
      if (pair) { el.value = pair.value || '#009fe3'; }
    }
  });
}

// Color pair sync
document.addEventListener('input', e => {
  const el = e.target;
  if (!el.dataset.path) return;
  if (el.type === 'color' || el.type === 'text'){
    document.querySelectorAll(`[data-path="${el.dataset.path}"]`).forEach(o => {
      if (o !== el) o.value = el.value;
    });
  }
});

    else {
      const j = await r.json().catch(()=>({}));
      $('#loginErr').textContent = j.error==='too_many_attempts' ? 'Забагато спроб. Зачекайте 10 хвилин.' : 'Невірний пароль';
      $('#loginErr').classList.remove('hidden');
    }
  } catch(e){ $('#loginErr').textContent='Помилка з\'єднання'; $('#loginErr').classList.remove('hidden'); }
  finally { $('#loginBtn').disabled = false; }
});

$('#logoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin/logout',{method:'POST'}).catch(()=>{});
  showLogin();
});

// ── Boot ───────────────────────────────────────────────────────
async function boot(){
  try {
    const me = await fetch('/api/admin/me').then(r=>r.json()).catch(()=>({authenticated:false}));
    if (!me.authenticated){ showLogin(); return; }
    [S, gamesCache, kikCache] = await Promise.all([
      api('GET','/api/admin/settings'),
      api('GET','/api/admin/games'),
      api('GET','/api/admin/kik'),
    ]);
    showApp();
    renderSidebar();
    draw();
    stamp();
    // Sidebar tab click (re-bind after render)
    document.querySelectorAll('.sb-btn[data-tab]').forEach(b => {
      b.addEventListener('click', () => switchTab(b.dataset.tab));
    });
  } catch(e){ showLogin(); }
}
boot();
</script>
</body>
</html>
