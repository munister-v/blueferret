<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Blue Ferret · CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bf:#009fe3;--bf-h:#0077b3;--bf-m:rgba(0,159,227,.15);--bf-glow:rgba(0,159,227,.3);
  --kik:#4bb272;--kik-h:#3d9a5f;--kik-m:rgba(75,178,114,.15);
  --dark:#0f0f13;--dark2:#1a1a24;--dark3:#242433;--dark4:#2d2d42;
  --bg:#0f0f13;
  --card:rgba(255,255,255,0.03);
  --glass-border:rgba(255,255,255,0.08);
  --line:rgba(255,255,255,0.08);
  --txt:#ffffff;--txt-m:rgba(255,255,255,0.6);--txt-s:rgba(255,255,255,0.4);
  --red:#ef4444;--green:#22c55e;
  --r:16px;--r-sm:10px;--r-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
.glass-panel { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); border-radius: var(--r); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.hover-glow { transition: all 0.3s ease; }
.hover-glow:hover { border-color: var(--bf); box-shadow: 0 0 20px var(--bf-glow); transform: translateY(-2px); }
.hidden{display:none!important}
button,input,select,textarea{font-family:inherit;font-size:14px}

/* ── LOGIN ── */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:var(--dark);
  background-image:radial-gradient(ellipse 90% 55% at 50% -10%,rgba(0,159,227,.15) 0%,transparent 55%),
    radial-gradient(ellipse 80% 50% at 80% 70%,rgba(75,178,114,.08) 0%,transparent 50%);}
.lb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(20px);
  border-radius:20px;padding:44px 40px;width:100%;max-width:400px;
  box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(0,159,227,.1),inset 0 1px 0 rgba(255,255,255,.1)}
.lb-logo{text-align:center;margin-bottom:32px}
.lb-ico{width:64px;height:64px;margin:0 auto 14px;background:linear-gradient(135deg,var(--bf),#0055aa);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 32px var(--bf-glow)}
.lb h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.lb p{color:rgba(255,255,255,.5);font-size:13px}
/* ── Login form — use #loginPage prefix for higher specificity than global input rules ── */
.lf{margin-bottom:18px}
.lf label{display:block;font-size:10.5px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
/* !important beats the global input[type=password]{background:#fff} rule */
#loginPage input[type=password],
#loginPage input[type=text]{
  width:100%!important;
  padding:13px 48px 13px 16px!important;
  background:rgba(255,255,255,.08)!important;
  border:1.5px solid rgba(255,255,255,.12)!important;
  border-radius:10px!important;
  color:#fff!important;
  font:500 15px Comfortaa,system-ui,sans-serif!important;
  outline:none!important;
  transition:border-color .2s,background .2s,box-shadow .2s!important;
  box-shadow:none!important;
  -webkit-text-fill-color:#fff!important;
  caret-color:#fff!important;
}
#loginPage input[type=password]::placeholder,
#loginPage input[type=text]::placeholder{color:rgba(255,255,255,.2)!important}
#loginPage input[type=password]:focus,
#loginPage input[type=text]:focus{
  border-color:var(--bf)!important;
  background:rgba(0,159,227,.08)!important;
  box-shadow:0 0 0 3px rgba(0,159,227,.2)!important;
}
/* show/hide toggle */
.pw-wrap{position:relative}
.pw-eye{position:absolute;right:0;top:0;bottom:0;width:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.3);font-size:17px;border:none;background:transparent;transition:color .15s;user-select:none;-webkit-user-select:none}
.pw-eye:hover{color:rgba(255,255,255,.7)}
/* remember me */
.lf-check{display:flex;align-items:center;gap:9px;cursor:pointer;padding:0;margin-bottom:20px}
.lf-check input[type=checkbox]{
  width:18px!important;height:18px!important;padding:0!important;
  accent-color:var(--bf);cursor:pointer;flex-shrink:0;
  border:none!important;background:transparent!important;box-shadow:none!important;
}
.lf-check span{font-size:13px;color:rgba(255,255,255,.45);line-height:1.3}
/* submit */
.l-btn{width:100%;padding:14px;border:none;cursor:pointer;font:700 15px Comfortaa,system-ui,sans-serif;
  background:linear-gradient(135deg,var(--bf),#0066cc);color:#fff;border-radius:10px;
  box-shadow:0 4px 20px rgba(0,159,227,.35);transition:transform .2s,box-shadow .2s;letter-spacing:.02em}
.l-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,159,227,.5)}
.l-btn:active:not(:disabled){transform:translateY(0)}
.l-btn:disabled{opacity:.45;cursor:default;transform:none}
#loginErr{color:#fca5a5;font-size:13px;text-align:center;margin-top:14px;line-height:1.4}

/* ── SHELL ── */
#appPage{display:flex;flex-direction:column;min-height:100vh}
header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;
  position:sticky;top:0;z-index:100;
  background:rgba(10,15,26,.96);border-bottom:1px solid rgba(255,255,255,.07);backdrop-filter:blur(14px)}
.h-brand{display:flex;align-items:center;gap:9px;color:#fff;font-weight:700;font-size:14px}
.h-dot{width:28px;height:28px;background:linear-gradient(135deg,var(--bf),#004fa3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 12px var(--bf-glow)}
.h-r{display:flex;align-items:center;gap:14px}
.h-link{color:rgba(255,255,255,.45);font-size:12.5px;text-decoration:none;transition:.15s}.h-link:hover{color:#fff}
.h-out{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.65);font:600 12.5px inherit;cursor:pointer;transition:.2s}.h-out:hover{background:rgba(255,255,255,.1);color:#fff}
.shell{display:flex;flex:1}

/* ── SIDEBAR ── */
.sidebar{width:206px;flex-shrink:0;background:var(--dark2);border-right:1px solid rgba(255,255,255,.05);padding:10px 0 24px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-g{padding:0 10px;margin-bottom:4px}
.sb-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.1em;padding:10px 8px 4px;display:flex;align-items:center;gap:6px}
.sb-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.sb-i{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:.15s}
.sb-i:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.sb-i.active{color:#fff;font-weight:700;background:rgba(0,159,227,.14);border:1px solid rgba(0,159,227,.22)}
.sb-i .ico{font-size:14px;width:18px;text-align:center}

/* ── MAIN ── */
.main{flex:1;padding:22px;min-width:0}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--glass-border);backdrop-filter:blur(12px);border-radius:var(--r);padding:22px;margin-bottom:18px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.ct{font-size:15px;font-weight:700}.cs{color:var(--txt-m);font-size:12px;margin-top:2px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.sc{border-radius:var(--r);padding:18px;border:1px solid var(--glass-border);
  background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.2);position:relative;overflow:hidden;transition:all 0.3s ease}
.sc:hover{transform:translateY(-2px);border-color:var(--g,var(--glass-border));box-shadow:0 12px 40px rgba(0,0,0,.3)}
.sc::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 0% 0%,var(--g,.1) 0%,transparent 60%);pointer-events:none}
.sc .n{font-size:32px;font-weight:700;line-height:1;color:#fff;margin-bottom:3px}
.sc .l{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.05em}
.sc.bl{--g:rgba(0,159,227,.2)}.sc.bl .n{color:var(--bf)}
.sc.gr{--g:rgba(75,178,114,.2)}.sc.gr .n{color:var(--kik)}
.sc.am{--g:rgba(251,191,36,.12)}.sc.am .n{color:#fbbf24}

/* ── PROGRESS ── */
.kik-banner{background:rgba(75,178,114,0.05);backdrop-filter:blur(12px);border:1px solid rgba(75,178,114,.15);border-radius:var(--r);padding:20px;margin-bottom:18px;background-image:radial-gradient(ellipse 80% 50% at 80% 80%,rgba(75,178,114,.1) 0%,transparent 50%);box-shadow:0 8px 32px rgba(0,0,0,.2)}
.kb-l{font-size:10px;font-weight:700;color:rgba(75,178,114,.75);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.kb-t{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px}
.kb-s{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:10px}
.pb{height:7px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.pb span{display:block;height:100%;background:linear-gradient(90deg,var(--kik),#22c55e);border-radius:99px;transition:.4s}

/* ── FORMS ── */
.field{margin-bottom:14px}
.flbl{display:block;font-size:11px;font-weight:700;color:var(--txt-m);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
input[type=text],input[type=url],input[type=email],input[type=password],input[type=number],input[type=date],select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--glass-border);border-radius:9px;background:rgba(255,255,255,0.05);color:var(--txt);transition:.15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--bf);box-shadow:0 0 0 3px var(--bf-m);background:rgba(0,159,227,0.05)}
textarea{resize:vertical;font-family:inherit;line-height:1.55}
textarea.code{font-family:ui-monospace,monospace;font-size:12.5px;min-height:200px;background:rgba(0,0,0,0.2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row-auto{display:flex;gap:12px;flex-wrap:wrap}
.row-auto>.field{flex:1;min-width:140px}
.sw{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;background:rgba(0,159,227,.04);border:1px solid rgba(0,159,227,.1);border-radius:9px}
.sw input{appearance:none;width:44px;height:24px;background:rgba(255,255,255,0.15);border-radius:99px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.sw input:checked{background:var(--bf)}
.sw input::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sw input:checked::after{left:22px}
.sw span{font-size:13px;font-weight:600;color:var(--txt)}
.cp{display:flex;align-items:center;gap:8px}
.cp input[type=color]{width:44px;height:40px;padding:2px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font:700 13px inherit;cursor:pointer;border:none;transition:.15s}
.btn-p{background:var(--bf);color:#fff;box-shadow:0 3px 12px rgba(0,159,227,.25)}.btn-p:hover{background:var(--bf-h);transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,0.06);color:var(--txt);border:1.5px solid var(--glass-border)}.btn-g:hover{border-color:var(--bf);color:var(--bf);background:rgba(0,159,227,0.05)}
.btn-k{background:var(--kik);color:#fff}.btn-k:hover{background:var(--kik-h)}
.btn-d{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.btn:disabled{opacity:.4;cursor:default}
.btn.is-loading{position:relative;color:transparent!important;pointer-events:none}
.btn.is-loading::after{content:'';position:absolute;width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .75s linear infinite}
.tool-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.searchbox{position:relative;min-width:240px;flex:1;max-width:420px}
.searchbox input{padding-left:36px;background:rgba(255,255,255,.045)}
.searchbox::before{content:'⌕';position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--txt-s);font-size:18px;line-height:1;pointer-events:none}
.row-actions{white-space:nowrap;display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
.url-pill{display:inline-flex;align-items:center;gap:6px;margin-top:3px;color:var(--txt-m);font-size:11.5px}
.url-pill code{font:600 11.5px ui-monospace,monospace;color:rgba(255,255,255,.62)}
.edit-status{display:flex;align-items:center;gap:8px;margin-left:auto;color:var(--txt-s);font-size:12px}
.edit-status .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.08)}
.edit-status.dirty{color:#fbbf24}.edit-status.dirty .dot{background:#f59e0b;box-shadow:0 0 0 4px rgba(245,158,11,.12)}
.field-help{margin-top:6px;color:var(--txt-s);font-size:11.5px;line-height:1.45}
.field-error{margin-top:6px;color:#fca5a5;font-size:12px;line-height:1.4;display:none}
.field-error.show{display:block}
.quality-box{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px}
.quality-box h4{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.38);margin-bottom:10px}
.quality-list{display:grid;gap:8px}
.quality-item{display:flex;align-items:flex-start;gap:8px;color:rgba(255,255,255,.58);font-size:12.5px;line-height:1.4}
.quality-item .q-dot{width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex:0 0 17px;font-size:10px;font-weight:800;margin-top:1px;background:rgba(239,68,68,.14);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.quality-item.ok{color:rgba(255,255,255,.76)}.quality-item.ok .q-dot{background:rgba(34,197,94,.14);color:#86efac;border-color:rgba(34,197,94,.25)}
.quality-item.warn .q-dot{background:rgba(245,158,11,.14);color:#fcd34d;border-color:rgba(245,158,11,.25)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--glass-border);color:var(--txt-m);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.tbl td{padding:12px 10px;border-bottom:1px solid var(--glass-border);vertical-align:middle}
.tbl tr:last-child td{border:none}
.tbl tr:hover td{background:rgba(255,255,255,0.03)}
.thumb{width:46px;height:46px;object-fit:cover;border-radius:8px;background:var(--bg)}
.thumb-empty{width:46px;height:46px;border-radius:8px;background:rgba(255,255,255,.05);border:1px dashed var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--txt-s);font-size:18px}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700}
.b-g{background:rgba(75,178,114,.15);color:#4ade80;border:1px solid rgba(75,178,114,.25)}
.b-r{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.b-s{background:rgba(255,255,255,.08);color:var(--txt-m);border:1px solid rgba(255,255,255,.12)}
.pg-w{min-width:100px}.pg{height:5px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:4px}
.pg span{display:block;height:100%;background:linear-gradient(90deg,var(--bf),#22c55e);border-radius:99px}

/* ── GAME EDITOR (full-page) ── */
.ged{display:flex;gap:0;height:calc(100vh - 56px);overflow:hidden}
.ged-form{flex:0 0 440px;min-width:320px;overflow-y:auto;padding:22px;background:var(--bg);border-right:1px solid var(--line)}
@media(max-width:900px){.ged{flex-direction:column;height:auto;overflow:visible}.ged-form{flex:none;min-width:0;border-right:none;border-bottom:1px solid var(--line)}.ged-preview{height:auto;min-height:400px}}
.ged-preview{flex:1;overflow-y:auto;background:var(--dark);
  background-image:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(0,159,227,.1) 0%,transparent 55%),
    radial-gradient(ellipse 80% 50% at 80% 80%,rgba(75,178,114,.06) 0%,transparent 50%);}
.ged-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.ged-section{background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:12px;padding:18px;margin-bottom:14px;backdrop-filter:blur(10px)}
.ged-section h4{font-size:11px;font-weight:700;color:var(--txt-m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--glass-border)}
.ged-actions{display:flex;gap:10px;padding:16px 22px;background:rgba(15,15,19,0.85);backdrop-filter:blur(10px);border-top:1px solid var(--glass-border);position:sticky;bottom:0;z-index:10}
.ged-actions .btn{min-height:38px}
/* Preview panel */
.pv{padding:32px 24px;min-height:100%;display:flex;flex-direction:column;gap:24px}
.pv-label{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;text-align:center;margin-bottom:8px}
/* Game card preview */
.gc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px);transition:.3s}
.gc-img{width:100%;height:220px;object-fit:cover;display:block;background:rgba(255,255,255,.04)}
.gc-img-empty{width:100%;height:220px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:32px}
.gc-body{padding:20px}
.gc-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.gc-sub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:14px;line-height:1.5}
.gc-desc{font-size:12.5px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:16px}
.gc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.gc-tag{background:rgba(0,159,227,.12);border:1px solid rgba(0,159,227,.2);color:rgba(0,159,227,.9);padding:4px 10px;border-radius:99px;font-size:11.5px;font-weight:600}
.gc-btn{display:block;text-align:center;background:var(--bf);color:#fff;padding:11px;border-radius:10px;font-weight:700;font-size:13.5px;box-shadow:0 4px 14px rgba(0,159,227,.35)}
/* KIK card preview */
.kc{background:rgba(255,255,255,.06);border:1px solid rgba(75,178,114,.15);border-radius:16px;overflow:hidden}
.kc-img{width:100%;height:180px;object-fit:cover;display:block;background:rgba(255,255,255,.04)}
.kc-body{padding:20px}
.kc-status{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:rgba(75,178,114,.15);color:var(--kik);border:1px solid rgba(75,178,114,.25);margin-bottom:10px}
.kc-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px}
.kc-sub{font-size:12.5px;color:rgba(255,255,255,.5);margin-bottom:14px}
.kc-nums{display:flex;gap:16px;margin-bottom:12px}
.kc-num{text-align:center}
.kc-num .v{font-size:18px;font-weight:700;color:#fff}
.kc-num .l{font-size:10.5px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em}
.kc-pb{height:8px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:16px}
.kc-pb span{display:block;height:100%;background:linear-gradient(90deg,var(--kik),#22c55e);border-radius:99px}
.kc-btn{display:block;text-align:center;background:var(--kik);color:#fff;padding:11px;border-radius:10px;font-weight:700;font-size:13.5px}

/* ── MEDIA ── */
.m-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:10px}
.m-i{position:relative;border:2px solid var(--line);border-radius:9px;overflow:hidden;aspect-ratio:1;background:var(--bg);cursor:pointer;transition:.15s}
.m-i img{width:100%;height:100%;object-fit:cover;display:block}
.m-ov{position:absolute;inset:0;background:rgba(10,15,26,.65);opacity:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:.15s}
.m-i:hover .m-ov{opacity:1}
.m-ov button{background:#fff;border:none;border-radius:6px;padding:4px 9px;font:600 11.5px inherit;cursor:pointer}
.m-ov .del{background:#fef2f2;color:var(--red)}
.m-lbl{font-size:9.5px;color:var(--txt-m);text-align:center;padding:2px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-z{border:2px dashed var(--line);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:.2s;background:rgba(0,159,227,.02)}
.upload-z:hover,.upload-z.drag{border-color:var(--bf);background:var(--bf-m)}

/* ── DEVICE SWITCHER ── */
.dev-bar{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border-radius:8px;padding:3px}
.dev-btn{width:32px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-size:13px;transition:.15s}
.dev-btn.on{background:rgba(255,255,255,.15);color:#fff}
.dev-btn:hover:not(.on){background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
/* iframe device frames */
.pv-frame-wrap{width:100%;height:calc(100% - 38px);margin-top:38px;overflow:auto;display:flex;align-items:flex-start;justify-content:center;background:inherit}
.pv-frame-wrap.desktop{align-items:stretch}
.pv-frame-wrap.desktop iframe{width:100%;height:100%;transform:none}
.pv-frame-wrap.tablet{padding:20px 10px}
.pv-frame-wrap.tablet iframe{width:768px;height:1024px;border-radius:12px;box-shadow:0 0 0 12px #1e2d4a,0 24px 60px rgba(0,0,0,.5);flex-shrink:0}
.pv-frame-wrap.mobile{padding:24px 10px}
.pv-frame-wrap.mobile iframe{width:390px;height:844px;border-radius:40px;box-shadow:0 0 0 14px #1e2d4a,0 0 0 16px #111827,0 24px 60px rgba(0,0,0,.6);flex-shrink:0}
.pv-frame-wrap.mobile iframe::before{content:'';display:block;height:32px;background:#1e2d4a}
/* zoom wrapper */
.pv-zoom-wrap{transition:transform .25s cubic-bezier(.22,1,.36,1);transform-origin:top center}
.pv-frame-wrap:not(.desktop) .pv-zoom-wrap{display:inline-block}
/* drag handle */
.drag-handle{width:6px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;transition:.15s;z-index:20}
.drag-handle:hover,.drag-handle.dragging{background:rgba(0,159,227,.3)}
.drag-handle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:40px;border-radius:2px;background:rgba(255,255,255,.15);transition:.15s}
.drag-handle:hover::after,.drag-handle.dragging::after{background:var(--bf);height:60px}
/* highlight block on hover */
.blk:hover{cursor:text}
.blk.focused{border-color:var(--bf)!important;box-shadow:0 0 0 3px var(--bf-m)!important}
/* preview refresh animation */
.pv-refreshing{opacity:.4;transition:opacity .2s ease}
.pv-refreshed{opacity:1;transition:opacity .3s ease}
/* zoom control */
.zoom-ctrl{display:flex;align-items:center;gap:4px;margin-left:auto}
.zoom-btn{width:26px;height:26px;border:1px solid rgba(255,255,255,.15);border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font:600 14px inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.zoom-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.zoom-val{font-size:11px;color:rgba(255,255,255,.45);min-width:32px;text-align:center}
/* game preview modes */
.pv-mode-bar{display:flex;gap:4px;margin-bottom:14px;background:rgba(255,255,255,.06);border-radius:8px;padding:3px;width:fit-content}
.pv-mode-btn{padding:5px 12px;border-radius:6px;font:600 12px inherit;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.4);transition:.15s}
.pv-mode-btn.on{background:rgba(255,255,255,.12);color:#fff}
.pv-mode-btn:hover:not(.on){color:rgba(255,255,255,.7)}

/* ── PAGE CREATE DIALOG ── */
.pg-dialog{position:fixed;inset:0;background:rgba(10,15,26,.7);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.pg-dialog-box{background:rgba(15,15,19,0.9);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:18px;width:100%;max-width:520px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.pg-dh{padding:22px 24px 0;border-bottom:1px solid var(--glass-border)}
.pg-dh h3{font-size:17px;font-weight:700;margin-bottom:14px}
.pg-dtabs{display:flex;gap:2px;margin-bottom:-1px}
.pg-dtab{padding:8px 16px;font:600 13px inherit;cursor:pointer;border:none;background:transparent;color:var(--txt-m);border-bottom:2.5px solid transparent;transition:.15s}
.pg-dtab.on{color:var(--bf);border-bottom-color:var(--bf)}
.pg-db{padding:22px 24px}
.pg-df{padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--glass-border)}
/* page type cards */
.pg-types{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pg-type{border:2px solid var(--line);border-radius:11px;padding:14px;cursor:pointer;transition:.15s;text-align:center}
.pg-type:hover{border-color:var(--bf)}
.pg-type.sel{border-color:var(--bf);background:rgba(0,159,227,.05)}
.pg-type .ico{font-size:28px;margin-bottom:6px}
.pg-type .lbl{font-size:13px;font-weight:700;color:var(--txt)}
.pg-type .sub{font-size:11.5px;color:var(--txt-m);margin-top:2px}
/* page list improvements */
.pg-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px}
.pg-row-actions{display:flex;gap:4px;opacity:0;transition:.15s}
.p-row:hover .pg-row-actions{opacity:1}
.pg-act-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--txt-m);transition:.15s}
.pg-act-btn:hover{border-color:var(--bf);color:var(--bf)}
.pg-act-btn.del:hover{border-color:var(--red);color:var(--red)}
/* system pages badge */
.pg-sys{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:4px;background:#f1f5f9;color:var(--txt-s)}
/* editor mode banner */
.edit-mode-bar{background:linear-gradient(135deg,rgba(0,159,227,.1),rgba(0,159,227,.06));border-bottom:1px solid rgba(0,159,227,.2);padding:7px 16px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--bf);flex-shrink:0}
.edit-mode-bar strong{font-weight:700}
.edit-mode-dot{width:7px;height:7px;border-radius:50%;background:var(--bf);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── PAGES ── */
.pages-shell{display:flex;height:calc(100vh - 56px);gap:0;overflow:hidden}
.pages-nav{width:220px;flex-shrink:0;background:var(--dark2);border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;padding:14px 10px}
.pages-nav .nav-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;padding:0 6px 10px;display:flex;align-items:center;justify-content:space-between}
.pages-nav .cnt{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:1px 7px;border-radius:5px;font-size:10px}
.p-grp{margin-bottom:8px}
.p-grp-l{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.1em;padding:6px 6px 3px;display:flex;align-items:center;gap:5px}
.p-grp-l::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.p-row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:.12s}
.p-row:hover{background:rgba(255,255,255,.05)}
.p-row.ap{background:rgba(0,159,227,.14);border-color:rgba(0,159,227,.25)}
.p-ico{font-size:13px;flex-shrink:0}
.p-inf{flex:1;min-width:0}
.p-path{font-weight:700;font-size:12px;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-row.ap .p-path{color:#fff}
.p-mt{color:rgba(255,255,255,.3);font-size:10px;margin-top:1px}
/* editor */
.pages-editor{flex:0 0 440px;background:var(--bg);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;transition:flex-basis .25s ease}
.pages-editor.collapsed{flex-basis:0;overflow:hidden}
/* sticky toolbar */
.ped-toolbar{padding:10px 14px;background:var(--dark2);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ped-filename{font-size:11px;font-family:ui-monospace,monospace;color:rgba(255,255,255,.5);background:rgba(255,255,255,.06);padding:3px 9px;border-radius:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
/* editor tabs */
.ped-tabs{display:flex;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--glass-border);flex-shrink:0}
.ped-tab{flex:1;padding:9px 8px;text-align:center;font:700 11.5px inherit;cursor:pointer;color:var(--txt-m);border:none;background:transparent;border-bottom:2.5px solid transparent;transition:.15s;position:relative}
.ped-tab:hover{color:var(--txt);background:rgba(255,255,255,0.04)}
.ped-tab.on{color:var(--bf);border-bottom-color:var(--bf);background:rgba(255,255,255,0.06)}
.ped-tab .tab-cnt{position:absolute;top:6px;right:6px;min-width:16px;height:16px;border-radius:99px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
.ped-tab.on .tab-cnt{background:var(--bf);color:#fff}
.ped-tab:not(.on) .tab-cnt{background:#e2e8f0;color:var(--txt-m)}
.ped-tab .tab-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:#f59e0b;display:none}
.ped-tab.has-changes .tab-dot{display:block}
.ped-tab.has-changes .tab-cnt{display:none}
.ped-body{flex:1;padding:14px 16px;overflow-y:auto}
.ped-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;text-align:center;color:var(--txt-m)}
.ped-empty .big{font-size:42px;margin-bottom:12px}
/* search */
.ped-search{position:relative;margin-bottom:14px}
.ped-search input{padding-left:30px;font-size:13px;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:9px;color:var(--txt)}
.ped-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
/* empty tab state */
.tab-empty{text-align:center;padding:32px 16px;color:var(--txt-m);font-size:13px}
/* sidebar collapse toggle */
.sb-toggle{position:absolute;right:-14px;top:50%;transform:translateY(-50%);width:28px;height:28px;background:var(--dark3);border:1.5px solid var(--glass-border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:.2s}
.sb-toggle:hover{border-color:var(--bf);color:var(--bf);background:rgba(0,159,227,.1)}
/* block card */
.blk{background:rgba(255,255,255,0.03);border:1.5px solid var(--glass-border);backdrop-filter:blur(10px);border-radius:11px;padding:14px 16px;margin-bottom:10px;transition:.15s}
.blk:focus-within{border-color:var(--bf);box-shadow:0 0 0 3px var(--bf-m);background:rgba(255,255,255,0.05)}
.blk-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.blk-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.blk-ico.seo{background:rgba(99,102,241,.15);color:#818cf8}
.blk-ico.h1{background:rgba(0,159,227,.15);color:var(--bf);font-size:10px}
.blk-ico.h2{background:rgba(0,159,227,.1);color:var(--bf);font-size:10px}
.blk-ico.h3{background:rgba(0,159,227,.06);color:var(--bf);font-size:10px}
.blk-ico.p{background:rgba(255,255,255,0.08);color:var(--txt-m)}
.blk-lbl{font-size:11px;font-weight:700;color:var(--txt-m);text-transform:uppercase;letter-spacing:.06em}
.blk input[type=text],.blk textarea{border:none;padding:0;border-radius:0;box-shadow:none;background:transparent;font-size:14px;font-weight:500;color:var(--txt);resize:none}
.blk input[type=text]:focus,.blk textarea:focus{outline:none;box-shadow:none;border:none}
.blk.h1 input{font-size:17px;font-weight:700}
.blk.h2 input{font-size:15px;font-weight:700}
.blk textarea{min-height:72px;line-height:1.6}
/* preview iframe */
.pages-preview{flex:1;background:var(--dark);position:relative;overflow:hidden}
.pv-bar{position:absolute;top:0;left:0;right:0;z-index:10;background:rgba(10,15,26,.85);backdrop-filter:blur(8px);padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.pv-url{font-size:11.5px;color:rgba(255,255,255,.45);font-family:ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pv-iframe{width:100%;height:100%;border:none;padding-top:38px}
.pv-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.2);gap:12px}
@media(max-width:1100px){.pages-editor{flex:0 0 360px}.pages-preview{display:none}}

/* ── MODAL (media picker, settings) ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,15,26,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:rgba(15,15,19,0.9);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:18px;width:100%;max-width:680px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.mh{padding:22px 24px 0;display:flex;justify-content:space-between;align-items:center}
.mh h3{font-size:16px;font-weight:700}
.mb{padding:18px 24px}
.mf{padding:14px 24px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--glass-border)}
.close-x{width:30px;height:30px;border:1.5px solid var(--glass-border);border-radius:7px;background:rgba(255,255,255,0.05);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt-m);transition:.15s}
.close-x:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,0.1)}

/* ── AUDIT ── */
.at{width:100%;border-collapse:collapse;font-size:12px}
.at td{padding:6px 8px;border-bottom:1px solid var(--line);color:var(--txt-m);vertical-align:top}
.at code{background:#f1f5f9;padding:1px 6px;border-radius:5px;font-size:11.5px;color:var(--txt);font-family:ui-monospace,monospace}

/* ── TOAST ── */
#toast{position:fixed;right:18px;bottom:22px;padding:12px 18px;border-radius:11px;font:600 13px inherit;opacity:0;transform:translateY(6px);transition:.25s;z-index:999;pointer-events:none;max-width:320px;display:flex;align-items:center;gap:8px}
#toast.s{opacity:1;transform:none}
#toast.ok{background:linear-gradient(135deg,#065f46,#047857);color:#d1fae5;border:1px solid rgba(16,185,129,.3)}
#toast.er{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fecaca;border:1px solid rgba(239,68,68,.3)}
#toast.i{background:linear-gradient(135deg,var(--dark3),var(--dark4));color:#fff;border:1px solid rgba(0,159,227,.2)}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:skel 1.4s infinite}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-line{height:14px;border-radius:6px;margin-bottom:10px}
.skel-card{border-radius:var(--r);padding:22px;background:rgba(255,255,255,0.02);border:1px solid var(--glass-border);margin-bottom:16px;backdrop-filter:blur(10px)}

/* ── FILTER TABS ── */
.ftabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,0.02);border:1px solid var(--glass-border);border-radius:10px;padding:4px;width:fit-content}
.ftab{padding:6px 14px;border-radius:7px;font:600 12.5px inherit;cursor:pointer;border:none;background:transparent;color:var(--txt-m);transition:.15s}
.ftab.on{background:var(--bf);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.ftab .cnt{font-size:10.5px;margin-left:4px;opacity:.6}

/* ── ACTIVITY FEED ── */
.act-feed{display:flex;flex-direction:column;gap:0}
.act-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.act-item:last-child{border:none}
.act-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.act-body{flex:1;min-width:0}
.act-action{font-size:13px;font-weight:600;color:var(--txt)}
.act-time{font-size:11px;color:var(--txt-s);margin-top:2px}

/* ── BANNER PREVIEW ── */
.banner-pv{border-radius:10px;overflow:hidden;margin-top:14px;border:1.5px solid var(--line)}
.banner-pv-bar{padding:10px 16px;text-align:center;font:600 14px Comfortaa,sans-serif}
.banner-pv-page{background:#f8fafc;padding:20px;text-align:center;color:var(--txt-m);font-size:12px}

/* ── SCROLL TO TOP ── */
#scrollTop{position:fixed;right:20px;bottom:70px;width:38px;height:38px;border-radius:50%;background:var(--dark3);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:.2s}
#scrollTop:hover{background:var(--bf)}
#scrollTop.show{display:flex}

/* ── QUICK STAT TREND ── */
.sc .trend{font-size:10.5px;margin-top:6px;color:rgba(255,255,255,.35)}
.sc .trend.up{color:#4ade80}.sc .trend.dn{color:#f87171}

/* ── AUDIT ICONS ── */
.aico{width:28px;height:28px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}

/* ── SORT BAR ── */
.sort-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:12.5px;color:var(--txt-m)}
.sort-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.04);font:inherit;font-size:12px;cursor:pointer;color:var(--txt-m);transition:.15s}
.sort-btn.on,.sort-btn:hover{border-color:var(--bf);color:var(--bf);background:rgba(0,159,227,.1)}

/* ── IMAGE PICKER in form ── */
.img-pick{display:flex;gap:8px;align-items:stretch}
.img-pick input{flex:1}
.img-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:9px;border:1.5px solid var(--glass-border);background:var(--bg);display:block;margin-top:7px}
.img-thumb-empty{width:100%;height:90px;border:1.5px dashed var(--glass-border);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--txt-s);font-size:12px;margin-top:7px}

/* gallery */
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px}
.gal-i{position:relative;aspect-ratio:1;border-radius:7px;overflow:hidden;background:rgba(255,255,255,0.03);border:1.5px solid var(--glass-border);cursor:grab}
.gal-i:active{cursor:grabbing}
.gal-i img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.gal-i .rm{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(239,68,68,.9);border:none;cursor:pointer;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
.gal-add{aspect-ratio:1;border-radius:7px;border:2px dashed var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt-s);font-size:22px;background:rgba(255,255,255,0.02);transition:.15s}
.gal-add:hover{border-color:var(--bf);color:var(--bf);background:rgba(0,159,227,0.1)}

/* ── PAGE EDITOR improvements ── */
.blk{border-left:3px solid transparent;transition:.15s}
.blk.h1{border-left-color:var(--bf)}
.blk.h2{border-left-color:rgba(0,159,227,.4)}
.blk.h3{border-left-color:rgba(0,159,227,.2)}
.blk.seo{border-left-color:#6366f1}
.blk.p{border-left-color:var(--glass-border)}
.blk:hover{box-shadow:0 8px 24px rgba(0,0,0,.3)}
.blk.edited{border-color:var(--bf)!important;background:rgba(0,159,227,0.03);box-shadow:0 0 0 1px rgba(0,159,227,.2)}
.blk.edited .blk-ico{background:rgba(0,159,227,0.1)!important}
.char-bar{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.char-cnt{font-size:10.5px;font-weight:700;color:var(--txt-s);background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:5px}
.char-cnt.warn{color:#f59e0b;background:rgba(245,158,11,0.1)}.char-cnt.over{color:var(--red);background:rgba(239,68,68,0.1)}
.blk-actions{margin-left:auto;display:flex;gap:4px;opacity:0;transition:.15s}
.blk:hover .blk-actions,.blk.edited .blk-actions{opacity:1}
.reset-btn{background:none;border:1px solid var(--line);cursor:pointer;color:var(--txt-s);font-size:10.5px;padding:3px 8px;border-radius:6px;transition:.15s;white-space:nowrap}
.reset-btn:hover{background:var(--red);border-color:var(--red);color:#fff}
.unsaved-badge{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:99px;display:none;box-shadow:0 2px 8px rgba(245,158,11,.3)}
.unsaved-badge.show{display:inline-block}
.ped-hint{font-size:12px;color:var(--txt-m);background:rgba(0,159,227,.04);border:1px solid rgba(0,159,227,.12);border-radius:9px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;line-height:1.5}
/* block input styles by type */
.blk.h1 input[type=text]{font-size:20px;font-weight:700;color:var(--txt);letter-spacing:-.02em;padding:4px 0}
.blk.h2 input[type=text]{font-size:16px;font-weight:700;color:var(--txt)}
.blk.h3 input[type=text]{font-size:14px;font-weight:600;color:var(--txt)}
.blk.seo input[type=text],.blk.seo textarea{font-size:13.5px;color:var(--txt)}
.blk.p textarea{font-size:13.5px;line-height:1.7;color:var(--txt);font-family:inherit}
.blk input[type=text],.blk textarea{background:transparent;border:none;border-bottom:1.5px solid transparent;border-radius:0;padding:4px 0;transition:.15s;width:100%}
.blk input[type=text]:hover,.blk textarea:hover{border-bottom-color:var(--line)}
.blk input[type=text]:focus,.blk textarea:focus{outline:none;border-bottom-color:var(--bf);background:rgba(0,159,227,.02);box-shadow:none;border-radius:0}
.sect-head{font-size:10px;font-weight:700;color:var(--txt-m);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--line);display:flex;align-items:center;gap:8px;justify-content:space-between}
.sect-cnt{background:var(--bg);padding:1px 8px;border-radius:5px;font-size:9.5px;color:var(--txt-s)}

/* ── MEDIA improvements ── */
.m-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.m-i{position:relative;border:2px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg);cursor:pointer;transition:.2s;display:flex;flex-direction:column}
.m-i.sel{border-color:var(--bf);box-shadow:0 0 0 3px var(--bf-m)}
.m-i-img{aspect-ratio:1;overflow:hidden;position:relative}
.m-i-img img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}
.m-i:hover .m-i-img img{transform:scale(1.06)}
.m-ov{position:absolute;inset:0;background:rgba(10,15,26,.7);opacity:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:.2s;padding:8px}
.m-i:hover .m-ov{opacity:1}
.m-ov button{background:#fff;border:none;border-radius:7px;padding:5px 10px;font:600 11.5px inherit;cursor:pointer;width:100%;transition:.1s}
.m-ov button:hover{background:#f1f5f9}
.m-ov .del{background:#fff0f0;color:var(--red)}
.m-static-badge{position:absolute;top:6px;right:6px;background:rgba(10,15,26,.75);color:#fff;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:5px;z-index:1}
.m-lbl{padding:6px 8px;font-size:10.5px;color:var(--txt-m);background:#fff;border-top:1px solid var(--line)}
.m-lbl .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt);font-weight:600;font-size:11px}
.m-lbl .sz{color:var(--txt-s);font-size:10px}
/* info panel */
.media-info{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;display:none}
.media-info.show{display:block}
.media-info img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:var(--bg);margin-bottom:12px}
.media-info .info-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--line)}
.media-info .info-row:last-child{border:none}
.media-info .info-row .lbl{color:var(--txt-m)}
.media-info .info-row .val{font-weight:700;color:var(--txt);font-family:ui-monospace,monospace;font-size:11px}
.media-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.lightbox-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bulk-bar{background:var(--dark3);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px;display:none}
.bulk-bar.show{display:flex}
</style>
</head>

<script>
'use strict';
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];

let S={}, games=[], kik=[], mediaList=[], pages=[];
let activeTab='dashboard';
let pickerCallback=null;
// editor state
let editingGame=null, editingKik=null;
let gameGallery=[];
let editorDirty=false, gameSearch='';

// ── NAV ──
const NAV=[
  {g:'Огляд',items:[{id:'dashboard',ico:'📊',l:'Дашборд'}]},
  {g:'Контент',items:[
    {id:'games',ico:'🎲',l:'Ігри'},
    {id:'kik',ico:'🚀',l:'КІК-проекти'},
    {id:'pages',ico:'📄',l:'Сторінки'},
    {id:'sitetext',ico:'🌐',l:'Тексти сайту'},
    {id:'media',ico:'🖼',l:'Медіа'},
  ]},
  {g:'Налаштування',items:[
    {id:'general',ico:'⚙️',l:'Загальне'},
    {id:'banner',ico:'📢',l:'Банер'},
    {id:'maintenance',ico:'🔧',l:'Тех. режим'},
    {id:'contacts',ico:'📬',l:'Контакти'},
    {id:'seo',ico:'🔍',l:'SEO'},
    {id:'integrations',ico:'📈',l:'Аналітика'},
    {id:'appearance',ico:'🎨',l:'CSS'},
  ]},
  {g:'Система',items:[
    {id:'security',ico:'🔑',l:'Безпека'},
    {id:'audit',ico:'📋',l:'Журнал'},
  ]},
];
const STABS=new Set(['general','banner','maintenance','contacts','seo','integrations','appearance']);

// ── UTILS ──
const esc=x=>String(x??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const jsq=x=>String(x??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/</g,'\\x3c');
const fmtD=ts=>ts?new Date(ts).toLocaleString('uk-UA'):'—';
const fmtM=n=>Number(n||0).toLocaleString('uk-UA');
const fmtSz=b=>b<1024?b+'B':b<1048576?(b/1024).toFixed(0)+'KB':(b/1048576).toFixed(1)+'MB';
const relT=ts=>{const d=(Date.now()-ts)/1000;return d<60?'щойно':d<3600?Math.floor(d/60)+' хв тому':d<86400?Math.floor(d/3600)+' год тому':d<604800?Math.floor(d/86400)+' дн тому':fmtD(ts);};
const publicGameUrl=g=>g?.slug?`/igry/${g.slug}/`:'/igry/';
const absUrl=p=>new URL(p, location.origin).href;
const slugifyClient=s=>String(s||'').toLowerCase().replace(/[^a-zа-яіїєґ0-9]+/gi,'-').replace(/^-|-$/g,'');

function setEditorDirty(v){
  editorDirty=!!v;
  const st=$('#editStatus');
  if(st){
    st.classList.toggle('dirty',editorDirty);
    st.innerHTML=`<span class="dot"></span>${editorDirty?'Є незбережені зміни':'Збережено'}`;
  }
}
function canLeaveEditor(){
  return !editorDirty || confirm('Є незбережені зміни. Вийти без збереження?');
}
function setButtonLoading(btn, loading, text){
  if(!btn)return;
  if(loading){
    btn.dataset.label=btn.textContent;
    if(text)btn.textContent=text;
    btn.classList.add('is-loading');
    btn.disabled=true;
  }else{
    btn.classList.remove('is-loading');
    btn.disabled=false;
    if(btn.dataset.label){btn.textContent=btn.dataset.label;delete btn.dataset.label;}
  }
}
function copyText(text,label='Скопійовано ✓'){
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>toast(label,'ok')).catch(()=>fallbackCopy(text));
  else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('Скопійовано ✓','ok');}catch{toast(text,'i');}
  ta.remove();
}

const TOAST_ICO={ok:'✓',er:'✕',i:'ℹ'};
function toast(msg,type='i'){
  const t=$('#toast');t.textContent='';
  const ico=document.createElement('span');ico.style.opacity='.7';ico.textContent=TOAST_ICO[type]||'';
  t.appendChild(ico);t.appendChild(document.createTextNode(String(msg??'')));
  t.className='s '+type;clearTimeout(t._tid);t._tid=setTimeout(()=>t.className='',3000);
}
window.addEventListener('offline',()=>toast('Немає інтернету. Зміни краще не зберігати до відновлення звʼязку.','er'));
window.addEventListener('online',()=>toast('Звʼязок відновлено ✓','ok'));
async function api(method,url,body){
  if(navigator.onLine===false)throw new Error('Немає інтернету.');
  const ctl=new AbortController();
  const tid=setTimeout(()=>ctl.abort(),20000);
  let r;
  try{
    r=await fetch(url,{method,credentials:'same-origin',signal:ctl.signal,cache:'no-store',
      headers:body instanceof FormData?{}:body?{'Content-Type':'application/json'}:{},
      body:body instanceof FormData?body:body?JSON.stringify(body):undefined});
  }catch(e){
    if(e.name==='AbortError')throw new Error('Запит занадто довгий. Спробуйте ще раз.');
    throw new Error('Немає звʼязку з сервером CMS.');
  }finally{clearTimeout(tid);}
  if(r.status===401){showLogin();throw new Error('unauth');}
  if(!r.ok){
    const j=await r.json().catch(()=>({}));
    const map={slug_exists:'Такий slug вже існує',page_exists:'Сторінка з таким URL вже існує',not_found:'Не знайдено',title_required:'Назва обовʼязкова',invalid_password:'Невірний пароль',too_many_attempts:'Забагато спроб. Спробуйте пізніше.',file_too_large:'Файл завеликий. Максимум 10 MB.',unsupported_file_type:'Підтримуються тільки JPG, PNG, WebP, GIF, SVG або AVIF.'};
    throw new Error(map[j.error]||j.error||('HTTP '+r.status));
  }
  if(r.status===204)return null;
  return r.json();
}

// ── SIDEBAR ──
function buildNav(){
  $('#sidebar').innerHTML=NAV.map(g=>`<div class="sb-g">
    <div class="sb-lbl">${g.g}</div>
    ${g.items.map(it=>`<button class="sb-i${it.id===activeTab?' active':''}" data-tab="${it.id}"><span class="ico">${it.ico}</span>${it.l}</button>`).join('')}
  </div>`).join('');
}
$('#sidebar').addEventListener('click',e=>{
  const b=e.target.closest('[data-tab]');if(!b)return;
  if((activeTab==='game-editor'||activeTab==='kik-editor')&&!canLeaveEditor())return;
  activeTab=b.dataset.tab;render();
});

async function render(){
  buildNav();
  // scroll to top on tab change
  const el=$('#mainContent');el.scrollTop=0;window.scrollTo(0,0);
  // full-page editors
  if(activeTab==='game-editor'){el.style.padding='0';el.innerHTML='';renderGameEditor();return;}
  if(activeTab==='kik-editor'){el.style.padding='0';el.innerHTML='';renderKikEditor();return;}
  el.style.padding='22px';
  // skeleton loading
  el.innerHTML=renderSkeleton();
  try{
    switch(activeTab){
      case'dashboard':el.innerHTML=await renderDash();break;
      case'games':el.innerHTML=renderGamesList();break;
      case'kik':el.innerHTML=renderKikList();break;
      case'pages':await renderPages();break;
      case'sitetext':await renderSiteText();break;
      case'media':await renderMedia();break;
      case'security':el.innerHTML=renderSecurity();break;
      case'audit':el.innerHTML=await renderAudit();break;
      default:el.innerHTML=renderSettings(activeTab);
    }
  }catch(e){if(e.message!=='unauth')el.innerHTML=`<div class="card" style="color:var(--red)">Помилка: ${esc(e.message)}</div>`;}
}

// ── SKELETON ──
function renderSkeleton(){
  return`<div class="skel-card"><div class="skel skel-line" style="width:40%;height:18px;margin-bottom:20px"></div>${[1,2,3].map(()=>`<div class="skel skel-line" style="width:${60+Math.random()*30|0}%"></div>`).join('')}</div>
  <div class="skel-card"><div class="skel skel-line" style="width:30%;height:14px;margin-bottom:16px"></div>${[1,2,3,4].map(()=>`<div class="skel skel-line" style="width:${50+Math.random()*40|0}%"></div>`).join('')}</div>`;
}

// ── DASHBOARD ──
let gameFilter='all', mediaSort='date';
async function renderDash(){
  const [st, auditRows] = await Promise.all([
    api('GET','/api/admin/stats'),
    api('GET','/api/admin/audit').catch(()=>[])
  ]);
  const pct=st.kikGoal>0?Math.min(100,Math.round(st.kikRaised/st.kikGoal*100)):0;

  // activity feed (last 6 unique actions)
  const ACT_CFG={
    login_ok:    {ico:'🔑',bg:'rgba(99,102,241,.12)',  label:'Вхід в адмінку'},
    login_fail:  {ico:'⚠️',bg:'rgba(239,68,68,.1)',    label:'Невірний пароль'},
    settings_save:{ico:'⚙️',bg:'rgba(0,159,227,.1)',   label:'Налаштування збережено'},
    game_create: {ico:'🎲',bg:'rgba(0,159,227,.1)',    label:'Нова гра'},
    game_update: {ico:'✏️',bg:'rgba(99,102,241,.1)',   label:'Гру оновлено'},
    game_delete: {ico:'🗑',bg:'rgba(239,68,68,.1)',    label:'Гру видалено'},
    kik_create:  {ico:'🚀',bg:'rgba(75,178,114,.1)',   label:'Новий КІК-проект'},
    kik_update:  {ico:'📊',bg:'rgba(75,178,114,.1)',   label:'КІК оновлено'},
    kik_delete:  {ico:'🗑',bg:'rgba(239,68,68,.1)',    label:'КІК видалено'},
    page_patch:  {ico:'📄',bg:'rgba(251,191,36,.1)',   label:'Сторінку відредаговано'},
    page_edit:   {ico:'📝',bg:'rgba(251,191,36,.1)',   label:'HTML-редагування'},
    upload:      {ico:'🖼',bg:'rgba(75,178,114,.1)',   label:'Файл завантажено'},
    media_delete:{ico:'🗑',bg:'rgba(239,68,68,.1)',    label:'Файл видалено'},
    password_change:{ico:'🔐',bg:'rgba(99,102,241,.1)',label:'Пароль змінено'},
  };
  const feedItems=auditRows.slice(0,6).map(r=>{
    const cfg=ACT_CFG[r.action]||{ico:'📋',bg:'#f1f5f9',label:r.action};
    return`<div class="act-item">
      <div class="act-ico" style="background:${cfg.bg}">${cfg.ico}</div>
      <div class="act-body">
        <div class="act-action">${cfg.label}</div>
        <div class="act-time">${relT(r.ts)}${r.ip?' · '+r.ip:''}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="stats">
    <div class="sc bl"><div class="n">${st.games}</div><div class="l">Ігор</div><div class="trend">опубліковано</div></div>
    <div class="sc"><div class="n">${st.drafts}</div><div class="l">Чернеток</div></div>
    <div class="sc bl"><div class="n">${st.kik}</div><div class="l">КІК</div></div>
    <div class="sc gr"><div class="n">${st.backers}</div><div class="l">Бекерів</div></div>
    <div class="sc am"><div class="n">${st.uploads}</div><div class="l">Медіафайлів</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
    <div class="kik-banner" style="margin:0">
      <div class="kb-l">КІК · Загальні збори</div>
      <div class="kb-t">${fmtM(st.kikRaised)} / ${fmtM(st.kikGoal)} ₴</div>
      <div class="kb-s">${pct}% від цілі · ${fmtM(st.backers)} бекерів</div>
      <div class="pb"><span style="width:${pct}%"></span></div>
    </div>
    <div class="card" style="margin:0">
      <div class="ch" style="margin-bottom:10px"><div class="ct" style="font-size:13px">📋 Остання активність</div></div>
      <div class="act-feed">${feedItems||'<div style="color:var(--txt-s);font-size:12px;padding:8px 0">Поки що немає дій</div>'}</div>
    </div>
  </div>
  <div class="card">
    <div class="ch"><div class="ct">⚡ Швидкі дії</div></div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">

async function quickToggleStatus(type,id,current){
  const next={published:'draft',draft:'published',archived:'published'}[current]||'published';
  try{
    if(type==='game'){await api('PUT',`/api/admin/games/${id}`,{status:next});games=await api('GET','/api/admin/games');}
    else{await api('PUT',`/api/admin/kik/${id}`,{status:next});kik=await api('GET','/api/admin/kik');}
    toast(`Статус → ${next}`);render();
  }catch(e){toast(e.message,'er');}
}
window.quickToggleStatus=quickToggleStatus;

function findGame(id){return games.find(g=>Number(g.id)===Number(id));}
function openPublicGame(id){
  const g=findGame(id); if(!g)return toast('Гру не знайдено','er');
  window.open(absUrl(publicGameUrl(g)),'_blank','noopener');
}
function copyGameUrl(id){
  const g=findGame(id); if(!g)return toast('Гру не знайдено','er');
  copyText(absUrl(publicGameUrl(g)),'URL гри скопійовано ✓');
}
async function duplicateGame(id){
  const g=findGame(id); if(!g)return toast('Гру не знайдено','er');
  if(!confirm(`Створити чернетку-копію "${g.title}"?`))return;
  try{
    const copy=await api('POST',`/api/admin/games/${id}/duplicate`,{});
    games=await api('GET','/api/admin/games');
    toast('Копію створено як чернетку ✓','ok');
    openGameEditor(copy.id);
  }catch(e){if(e.message!=='unauth')toast('Помилка: '+e.message,'er');}
}
window.openPublicGame=openPublicGame;window.copyGameUrl=copyGameUrl;window.duplicateGame=duplicateGame;

function openGameEditor(id){
  editingGame=id?games.find(x=>x.id===id)||null:null;
  gameGallery=editingGame?parseGalleryValue(editingGame.gallery):[];
  editorDirty=false;
  activeTab='game-editor'; render();
}
function parseGalleryValue(value){
  if(Array.isArray(value))return value.filter(Boolean);
  if(typeof value==='string'){
    try{const parsed=JSON.parse(value||'[]');return Array.isArray(parsed)?parsed.filter(Boolean):[];}catch{return [];}
  }
  return [];
}

let galDragIdx = null;
window.galDragStart = function(e){
  galDragIdx = parseInt(e.currentTarget.dataset.i);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', galDragIdx);
  e.currentTarget.style.opacity = '0.5';
};
window.galDragOver = function(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
};
window.galDrop = function(e){
  e.preventDefault();
  e.currentTarget.style.opacity = '1';
  let dropIdx = parseInt(e.currentTarget.dataset.i);
  if(galDragIdx !== null && galDragIdx !== dropIdx && !isNaN(dropIdx)){
    const item = gameGallery.splice(galDragIdx, 1)[0];
    gameGallery.splice(dropIdx, 0, item);
    renderGallery();
    setEditorDirty(true);
  }
  galDragIdx = null;
};

    <img src="${esc(url)}" onerror="this.style.display='none'">
    <button class="rm" onclick="removeGalleryItem(${i})">✕</button>

function updateGameQuality(g){
  const el=$('#gameQualityList'); if(!el)return;
  const checks=[
    {ok:g.title.trim().length>=3,text:'Назва заповнена і виглядає як реальна назва'},
    {ok:!!g.cover,text:'Є обкладинка для каталогу та соцмереж'},
    {ok:g.desc.trim().length>=80,warn:g.desc.trim().length>=40,text:'Опис достатній для сторінки та SEO'},
    {ok:[g.players,g.age,g.dur].filter(Boolean).length>=2,warn:[g.players,g.age,g.dur].filter(Boolean).length>=1,text:'Є ключові характеристики: гравці, вік, тривалість'},
    {ok:!!g.slug&&g.slug===slugifyClient(g.slug),text:'URL чистий і готовий до публікації'},
    {ok:g.status!=='published'||!!g.cover&&g.desc.trim().length>=40,warn:g.status!=='published',text:g.status==='published'?'Опублікована гра має мінімальний контент':'Чернетка не показується в каталозі'},
  ];
  el.innerHTML=checks.map(c=>{
    const cls=c.ok?'ok':c.warn?'warn':'';
    const mark=c.ok?'✓':c.warn?'!':'×';
    return `<div class="quality-item ${cls}"><span class="q-dot">${mark}</span><span>${esc(c.text)}</span></div>`;
  }).join('');
}

function bindGameEditorQuality(){
  const form=$('#gedForm'); if(!form)return;
  form.addEventListener('input',()=>setEditorDirty(true));
  form.addEventListener('change',()=>setEditorDirty(true));
  const title=$('#g_title'), slug=$('#g_slug'), slugErr=$('#g_slug_err');
  let slugTouched=!!(slug&&slug.value);
  slug?.addEventListener('input',()=>{
    slugTouched=true;
    const next=slugifyClient(slug.value);
    if(slug.value!==next)slug.value=next;
    slugErr?.classList.toggle('show',!!slug.value&&slug.value!==next);
    updatePreview();
  });
  title?.addEventListener('input',()=>{
    if(!editingGame&&!slugTouched&&slug)slug.value=slugifyClient(title.value);
    updatePreview();
  });
}

async function verifyPublishedGame(slug){
  if(!slug)return false;
  try{
    const r=await fetch(`/igry/${encodeURIComponent(slug)}/?cms_check=${Date.now()}`,{cache:'no-store'});
    return r.ok;
  }catch{return false;}
}

async function saveGame(mode='exit'){
  const title=$('#g_title')?.value;
  if(!title){toast('Назва обов\'язкова','er');return;}
  const slug=$('#g_slug')?.value;
  if(slug&&slug!==slugifyClient(slug)){toast('Перевірте slug','er');return;}
  const btn=mode==='exit'?document.querySelector('.ged-actions .btn-p'):event?.currentTarget;
  setButtonLoading(btn,true,'Збереження…');
  try{
    const body={title,slug:$('#g_slug')?.value,subtitle:$('#g_subtitle')?.value,
      description:$('#g_desc')?.value,status:$('#g_status')?.value,
      cover_url:$('#g_cover')?.value,gallery:gameGallery,
      players:$('#g_players')?.value,age:$('#g_age')?.value,duration:$('#g_duration')?.value,
      buy_url:$('#g_buy')?.value,sort_order:+$('#g_sort')?.value||0};
    const saved=editingGame?await api('PUT',`/api/admin/games/${editingGame.id}`,body):await api('POST','/api/admin/games',body);
    games=await api('GET','/api/admin/games');
    const publicUrl=saved?.slug?`/igry/${saved.slug}/`:'/igry/';
    const liveOk=await verifyPublishedGame(saved?.slug);
    setEditorDirty(false);
    toast((editingGame?'Гру оновлено ✓':'Гру створено ✓')+` · ${liveOk?'сторінка доступна':'збережено в CMS'} · ${publicUrl}`,'ok');
    if(mode==='open'&&saved?.slug)window.open(absUrl(publicUrl),'_blank','noopener');
    if(mode==='stay'){
      editingGame=saved;
      gameGallery=parseGalleryValue(saved.gallery);
      renderGameEditor();
    }else{
      backToGames();
    }
  }catch(e){if(e.message!=='unauth')toast('Помилка: '+e.message,'er');}
  finally{setButtonLoading(btn,false);}
}
async function deleteGame(id){
  if(!confirm('Видалити гру?'))return;
  try{await api('DELETE',`/api/admin/games/${id}`);games=await api('GET','/api/admin/games');toast('Видалено','ok');backToGames();}
  catch(e){if(e.message!=='unauth')toast(e.message,'er');}
}
function backToGames(){
  if(!canLeaveEditor())return;
  editingGame=null;gameGallery=[];
  editorDirty=false;
  const el=$('#mainContent');if(el)el.style.padding='22px';
  activeTab='games';render();
}

}

async function execPgAction(){
  const btn=$('#pgDialogSave'); if(btn)btn.disabled=true;
  try{
    let res;
    if(pgDialogMode==='new'){
      const title=$('#pgNewTitle')?.value?.trim();
      const slug=$('#pgNewSlug')?.value?.trim();
      if(!slug) return toast('Вкажіть URL','er');
      const tplEl=$('.pg-type.sel');
      const tpl=tplEl?.dataset.tpl||'blank';
      const copyFrom=tpl.startsWith('copy:')?tpl.slice(5):null;
      res=await api('POST','/api/admin/pages/create',{slug,title:title||slug,copyFrom});
    } else {
      const from=$('#pgCopyFrom')?.value;
      const slug=$('#pgCopySlug')?.value?.trim();
      if(!from||!slug) return toast('Заповніть всі поля','er');
      res=await api('POST','/api/admin/pages/duplicate',{from,slug});
    }
    pages=await api('GET','/api/admin/pages');
    closePgDialog();
    activePage=res.file; pageBlocks=[]; pageEdited={};
    const extr=await api('GET',`/api/admin/page-extract?path=${encodeURIComponent(res.file)}`).catch(()=>({blocks:[]}));
    pageBlocks=extr.blocks||[];
    toast(`Сторінку /${res.slug}/ створено ✓`,'ok');
    await renderPages();
  }catch(e){ if(e.message!=='unauth') toast('Помилка: '+e.message,'er'); }
  finally{ if(btn)btn.disabled=false; }
}
window.execPgAction=execPgAction;

async function deletePage(file){
  const pg=pages.find(p=>p.file===file);
  if(!pg||SYS_PAGES.has(file)){ toast('Системну сторінку не можна видалити','er'); return; }
  if(!confirm(`Видалити сторінку "${pg.path}"?\n\nЦе незворотно!`)) return;
  try{
    await api('DELETE',`/api/admin/pages/delete?path=${encodeURIComponent(file)}`);
    if(activePage===file){ activePage=null; pageBlocks=[]; pageEdited={}; }
    pages=await api('GET','/api/admin/pages');
    toast(`Сторінку "${pg.path}" видалено`,'ok');
    await renderPages();
  }catch(e){ if(e.message!=='unauth') toast('Помилка: '+e.message,'er'); }
}
async function duplicatePage(file){
  const slug=prompt('URL нової сторінки (slug):');
  if(!slug) return;
  try{
    const res=await api('POST','/api/admin/pages/duplicate',{from:file,slug:slug.trim()});
    pages=await api('GET','/api/admin/pages');
    activePage=res.file; pageBlocks=[];pageEdited={};
    const extr=await api('GET',`/api/admin/page-extract?path=${encodeURIComponent(res.file)}`).catch(()=>({blocks:[]}));
    pageBlocks=extr.blocks||[];
    toast(`Дублікат /${res.slug}/ створено ✓`,'ok');
    await renderPages();
  }catch(e){ if(e.message!=='unauth') toast('Помилка: '+e.message,'er'); }
}

function buildBlocksHtml(blocks, tabFilter, search){
  const SEO_LIMITS={title:60,og_title:60,meta_desc:160};
  const typeToTab={seo:'seo',h1:'headings',h2:'headings',h3:'headings',p:'texts',a:'texts',span:'texts',li:'texts',img:'images'};
  let filtered=blocks.filter(b=>(typeToTab[b.type]||'texts')===tabFilter);
  if(search) filtered=filtered.filter(b=>b.value.toLowerCase().includes(search)||b.label.toLowerCase().includes(search));
  if(!filtered.length) return`<div class="tab-empty">${search?'Нічого не знайдено':'Немає блоків'}</div>`;
  return filtered.map(b=>{
    const isLong=b.type==='p'||(b.type==='seo'&&b.id==='meta_desc');
    const maxLen=SEO_LIMITS[b.id]||0;
    const curVal=pageEdited[b.id]!==undefined?pageEdited[b.id]:b.value;
    const curLen=curVal.length;
    const cntClass='char-cnt'+(maxLen&&curLen>maxLen?' over':maxLen&&curLen>maxLen*.85?' warn':'');
    const edited=pageEdited[b.id]!==undefined&&pageEdited[b.id]!==b.value;

    if (b.type === 'img') {
      return `<div class="blk img${edited?' edited':''}" data-id="${esc(b.id)}" data-tab="images" style="padding:14px 16px 12px">
        <div class="blk-head" style="margin-bottom:6px">
          <div class="blk-ico img">🖼</div>
          <span class="blk-lbl" style="font-size:10px;letter-spacing:.08em">${esc(b.label)}</span>
          <div class="blk-actions">
            <button class="reset-btn" onclick="resetField('${esc(b.id)}')" title="Скинути">↩</button>
          </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;margin-top:8px">
          <div style="width:64px;height:48px;border-radius:6px;overflow:hidden;background:rgba(255,255,255,0.05);flex-shrink:0;border:1px solid rgba(255,255,255,0.1)">
            <img src="${esc(curVal)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.opacity=0;setTimeout(()=>this.style.opacity=1,100)">
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <input type="text" id="inp_${esc(b.id)}" data-blk="${esc(b.id)}" oninput="markEdited('${esc(b.id)}')" value="${esc(curVal)}" style="padding:6px 10px;font-size:12.5px">
            <button class="btn btn-sm" onclick="openPickerFor('inp_${esc(b.id)}', (v)=>{const el=document.getElementById('inp_${esc(b.id)}');if(el){el.value=v;markEdited('${esc(b.id)}');}})" style="align-self:flex-start;background:rgba(0,159,227,0.15);color:var(--bf);padding:4px 10px;font-size:11.5px;border:none">🖼 Обрати з медіа</button>
          </div>
        </div>
      </div>`;
    }

    return`<div class="blk ${b.type}${edited?' edited':''}" data-id="${esc(b.id)}" data-tab="${typeToTab[b.type]||'texts'}" style="padding:14px 16px 12px">
      <div class="blk-head" style="margin-bottom:6px">
        <div class="blk-ico ${b.type==='seo'?'seo':b.type==='p'?'p':b.type}">${b.type.startsWith('h')?b.type.toUpperCase():esc(b.icon)}</div>
        <span class="blk-lbl" style="font-size:10px;letter-spacing:.08em">${esc(b.label)}</span>
        <div class="blk-actions">
          <button class="reset-btn" onclick="resetField('${esc(b.id)}')" title="Скинути">↩</button>
        </div>
      </div>
      ${isLong
        ?`<textarea data-blk="${esc(b.id)}" oninput="markEdited('${esc(b.id)}')" style="min-height:${b.type==='p'?80:52}px;padding:4px 0">${esc(curVal)}</textarea>`
        :`<input type="text" data-blk="${esc(b.id)}" oninput="markEdited('${esc(b.id)}')" value="${esc(curVal)}">`}
      ${maxLen?`<div class="char-bar">
        <span id="cc_${esc(b.id)}" class="${cntClass}" data-max="${maxLen}">${curLen} / ${maxLen}</span>
        <span style="font-size:10px;color:var(--txt-s)">${maxLen===60?'оптим. 50–60':'оптим. 140–160'}</span>
      </div>`:''}
    </div>`;
  }).join('');
}

function countTabChanges(tab){
  const typeToTab={seo:'seo',h1:'headings',h2:'headings',h3:'headings',p:'texts',a:'texts',span:'texts',li:'texts',img:'images'};
  return pageBlocks.filter(b=>(typeToTab[b.type]||'texts')===tab&&pageEdited[b.id]!==undefined&&pageEdited[b.id]!==b.value).length;

  const typeToTab={seo:'seo',h1:'headings',h2:'headings',h3:'headings',p:'texts',a:'texts',span:'texts',li:'texts',img:'images'};
  return pageBlocks.filter(b=>(typeToTab[b.type]||'texts')===tab).length;
}

function updateTabBadges(){
  $$('.ped-tab').forEach(t=>{
    const tab=t.dataset.tab;if(!tab)return;
    const changes=countTabChanges(tab);
    const cnt=t.querySelector('.tab-cnt');
    if(cnt)cnt.textContent=countTab(tab);
    t.classList.toggle('has-changes',changes>0);
  });
  // update unsaved badge total
  const total=Object.keys(pageEdited).filter(k=>{const b=pageBlocks.find(x=>x.id===k);return b&&pageEdited[k]!==b.value;}).length;

// flatten object → [{path, value, section}] for string leaves only
function flattenContent(obj){
  const out=[];
  function rec(o,pathArr,section){
    if(typeof o==='string'){ out.push({path:pathArr.join('.'),value:o,section}); return; }
    if(Array.isArray(o)){ o.forEach((v,i)=>rec(v,[...pathArr,i],section)); return; }
    if(o&&typeof o==='object'){ for(const k of Object.keys(o)) rec(o[k],[...pathArr,k], section||k); }
  }
  for(const k of Object.keys(obj)) rec(obj[k],[k],k);
  return out;
}

async function saveSiteContent(){
  const flat=flattenContent(siteContent);
  const changes=Object.keys(siteEdited)
    .filter(p=>{const f=flat.find(x=>x.path===p);return f&&siteEdited[p]!==f.value;})
    .map(p=>({path:p,value:siteEdited[p]}));
  if(!changes.length)return;
  const btn=$('#scSaveBtn');if(btn)btn.disabled=true;
  try{
    const r=await api('PUT','/api/admin/site-content',{changes});
    // apply to local copy
    changes.forEach(c=>{
      const parts=c.path.split('.');let o=siteContent;
      for(let i=0;i<parts.length-1;i++){const k=/^\d+$/.test(parts[i])?+parts[i]:parts[i];o=o[k];}
      const last=/^\d+$/.test(parts.at(-1))?+parts.at(-1):parts.at(-1);o[last]=c.value;
    });
    siteEdited={};
    toast(`Збережено ${r.applied} змін ✓`,'ok');
    renderSiteText();
  }catch(e){if(e.message!=='unauth')toast('Помилка: '+e.message,'er');}
  finally{if(btn)btn.disabled=false;}
}

let blockElMap={}; // block.id -> DOM element in iframe
function normTxt(s){return String(s||'').replace(/\s+/g,' ').trim();}

function onPvLoad(){
  const f=$('#pvIframe');if(!f)return;
  f.classList.remove('pv-refreshing');f.classList.add('pv-refreshed');
  try{
    const doc=f.contentDocument;if(!doc)return;
    // wire up click-to-edit + mapping after a tick (let hydration settle)
    setTimeout(()=>{ try{ mapBlocksToDom(doc); injectPreviewHelpers(doc,f); }catch(e){} },350);
    // gentle scroll past header
    setTimeout(()=>{ try{const h=doc.querySelector('header');if(h)f.contentWindow.scrollTo({top:h.offsetHeight+8,behavior:'smooth'});}catch{} },400);
  }catch{}

function mapBlocksToDom(doc){
  blockElMap={};
  const usedEls=new Set();
  const candidates=[...doc.querySelectorAll('h1,h2,h3,p,a,span,img,li')];
  for(const b of pageBlocks){
    if(b.type==='seo'){
      if(b.id==='title'){ blockElMap[b.id]={set:v=>{doc.title=v;}}; }
      continue;
    }
    const tag=b.type; // h1/h2/h3/p/a/span/img/li
    const want=normTxt(b.value);
    const el=candidates.find(e=>{
      if(usedEls.has(e)) return false;
      if(e.tagName.toLowerCase()!==tag) return false;
      if(tag==='img'){ return (e.getAttribute('src')||'').trim() === b.value.trim(); }
      return normTxt(e.textContent)===want;
    });
    if(el){usedEls.add(el);el.__bf=b.id;blockElMap[b.id]=el;}
  }
}

      #bf-edit-tip.show{opacity:1}`;
    doc.head.appendChild(st);
  }
  // tip
  let tip=doc.getElementById('bf-edit-tip');
  if(!tip){tip=doc.createElement('div');tip.id='bf-edit-tip';tip.textContent='✏️ Режим редагування — клікніть на текст';doc.body.appendChild(tip);}
  // mark mapped elements
  Object.entries(blockElMap).forEach(([id,el])=>{
    if(el&&el.nodeType===1){
      el.setAttribute('data-bf-editable','1');

function initDragHandle(){
  const handle=$('#pvDragHandle');
  const editor=$('.pages-editor');
  const preview=$('#pagesPreview');
  if(!handle||!editor||!preview)return;
  let startX=0,startW=0,dragging=false;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();dragging=true;startX=e.clientX;startW=editor.offsetWidth;
    handle.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const delta=e.clientX-startX;
    const newW=Math.max(280,Math.min(600,startW+delta));
    editor.style.flex=`0 0 ${newW}px`;
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;dragging=false;
    handle.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';
  });
}

    const blk=e.target.closest?.('.blk');

}
