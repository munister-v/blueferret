<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Blue Ferret — CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --acc:#009fe3;--acc-d:#0077b3;--acc-l:rgba(0,159,227,.10);
  --kik:#4bb272;--kik-d:#3a9960;--kik-l:rgba(75,178,114,.10);
  --red:#e11d48;--red-l:rgba(225,29,72,.08);
  --bg:#f0f4f8;--card:#fff;
  --ink:#1e293b;--ink2:#334155;--muted:#64748b;
  --border:rgba(15,23,42,.10);--border-s:rgba(15,23,42,.05);
  --dark:#0f172a;--dark2:#1e293b;
  --sb:230px;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;scroll-behavior:smooth}
body{font-family:'Comfortaa',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}

/* ─── Login ─── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:var(--dark);
  background-image:
    radial-gradient(ellipse 70% 50% at 15% 85%,rgba(0,159,227,.22),transparent 55%),
    radial-gradient(ellipse 60% 40% at 85% 15%,rgba(75,178,114,.16),transparent 55%)}
.login-box{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:44px 40px;
  width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px}
.login-icon{width:42px;height:42px;border-radius:13px;background:var(--acc);
  box-shadow:0 6px 20px rgba(0,159,227,.45);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px}
.login-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#fff}
.login-sub{color:rgba(255,255,255,.4);font-size:13px;text-align:center;margin-bottom:30px}
.login-label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-bottom:8px;margin-top:20px}
.login-input{width:100%;padding:13px 16px;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;
  font-family:'Comfortaa',sans-serif;font-size:14px;background:rgba(255,255,255,.07);
  color:#fff;outline:none;transition:.2s}
.login-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,159,227,.2)}
.login-input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{width:100%;margin-top:20px;background:var(--acc);color:#fff;border:none;
  padding:15px;border-radius:12px;font-family:'Comfortaa',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:.2s;box-shadow:0 4px 18px rgba(0,159,227,.38)}
.login-btn:hover:not(:disabled){background:var(--acc-d)}
.login-btn:disabled{opacity:.5;cursor:default}
.login-err{color:#f87171;font-size:13px;text-align:center;margin-top:14px}
.hidden{display:none!important}

/* ─── Shell ─── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ─── Sidebar ─── */
.sb{width:var(--sb);flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.05)}
.sb-brand{padding:20px 16px 18px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06)}
.sb-icon{width:34px;height:34px;border-radius:10px;background:var(--acc);flex-shrink:0;
  box-shadow:0 3px 12px rgba(0,159,227,.4);display:flex;align-items:center;justify-content:center;font-size:16px}
.sb-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;line-height:1.1}
.sb-name small{display:block;font-family:'Comfortaa',sans-serif;font-size:10px;color:rgba(255,255,255,.3);font-weight:400}
.sb-nav{padding:12px 8px;flex:1;overflow-y:auto}
.sb-section{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.22);padding:14px 12px 5px}
.sb-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;border-radius:10px;
  border:none;background:none;cursor:pointer;color:rgba(255,255,255,.5);
  font-family:'Comfortaa',sans-serif;font-size:13px;font-weight:600;
  text-align:left;transition:.15s;text-decoration:none}
.sb-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.sb-item.active{background:rgba(0,159,227,.18);color:var(--acc)}
.sb-item .ico{flex-shrink:0;width:18px;height:18px;opacity:.65}
.sb-item.active .ico{opacity:1}
.sb-badge{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);
  font-size:10.5px;font-weight:700;min-width:20px;text-align:center;padding:2px 7px;border-radius:99px}
.sb-item.active .sb-badge{background:rgba(0,159,227,.3);color:#fff}
.sb-foot{padding:10px 8px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-site{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;
  color:rgba(255,255,255,.38);font-size:12px;text-decoration:none;transition:.15s}
.sb-site:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.65)}
.sb-logout{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;
  border:none;background:none;cursor:pointer;width:100%;text-align:left;
  color:rgba(255,255,255,.38);font-family:'Comfortaa',sans-serif;font-size:13px;font-weight:600;transition:.15s}
.sb-logout:hover{background:rgba(239,68,68,.14);color:#f87171}

/* ─── Main ─── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:20;background:rgba(240,244,248,.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.breadcrumb b{color:var(--ink);font-weight:700}
.page-body{padding:28px;max-width:1000px}

/* ─── Cards ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:26px;margin-bottom:20px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:22px}
.card-head-text h2{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;color:var(--ink)}
.card-head-text p{margin-top:4px;color:var(--muted);font-size:12.5px}

/* ─── Stat row (dashboard) ─── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:22px 20px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
.stat-num{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--ink);line-height:1}
.stat-label{font-size:12.5px;color:var(--muted);margin-top:5px;font-weight:600}

/* ─── Quick actions ─── */
.qa-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}

/* ─── Content cards (games/kik) ─── */
.content-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.05);display:flex;flex-direction:column;
  transition:.15s;cursor:pointer}
.item-card:hover{box-shadow:0 6px 20px rgba(15,23,42,.1);transform:translateY(-2px);border-color:rgba(0,159,227,.25)}
.item-cover{width:100%;aspect-ratio:3/2;object-fit:cover;background:var(--acc-l);
  display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0}
.item-cover img{width:100%;height:100%;object-fit:cover}
.item-body{padding:16px;flex:1;display:flex;flex-direction:column}
.item-title{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.item-sub{font-size:12px;color:var(--muted);margin-bottom:10px;flex:1}
.item-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}

/* ─── Badges ─── */
.badge{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge-green{background:rgba(22,163,74,.12);color:#15803d}
.badge-yellow{background:rgba(234,179,8,.11);color:#a16207}
.badge-gray{background:rgba(100,116,139,.1);color:var(--muted)}

/* ─── Progress ─── */
.prog{height:5px;background:rgba(15,23,42,.08);border-radius:99px;overflow:hidden;margin-top:8px}
.prog-bar{height:100%;background:var(--kik);border-radius:99px;transition:.3s}

/* ─── Empty state ─── */
.empty{text-align:center;padding:56px 24px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-text{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px}
.empty-hint{font-size:13px;color:var(--muted);margin-bottom:20px}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;padding:11px 20px;
  border-radius:10px;font-family:'Comfortaa',sans-serif;font-size:13.5px;font-weight:700;
  cursor:pointer;transition:.15s;text-decoration:none;white-space:nowrap;line-height:1}
.btn-primary{background:var(--acc);color:#fff;box-shadow:0 3px 10px rgba(0,159,227,.28)}
.btn-primary:hover:not(:disabled){background:var(--acc-d)}
.btn-kik{background:var(--kik);color:#fff;box-shadow:0 3px 10px rgba(75,178,114,.28)}
.btn-kik:hover:not(:disabled){background:var(--kik-d)}
.btn-ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:rgba(15,23,42,.22);background:#f8fafc}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover:not(:disabled){background:#c01040}
.btn-sm{padding:8px 16px;font-size:12.5px;border-radius:9px}
.btn-xs{padding:6px 12px;font-size:11.5px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:default}

/* ─── Forms ─── */
.field{margin-bottom:16px}
.field>label,.flabel{display:block;font-size:11.5px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--ink2);margin-bottom:7px}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
.row2{display:flex;gap:14px;flex-wrap:wrap}
.row2>.field{flex:1;min-width:160px}
input[type=text],input[type=url],input[type=email],
input[type=number],input[type=date],textarea,select{
  width:100%;padding:11px 13px;
  border:1.5px solid rgba(15,23,42,.13);border-radius:10px;
  font-family:'Comfortaa',sans-serif;font-size:13.5px;
  background:#fff;color:var(--ink);transition:.15s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-l)}
textarea{min-height:100px;resize:vertical;font-family:'Comfortaa',sans-serif;font-size:13.5px;line-height:1.6}
.switch-row{display:flex;align-items:center;gap:10px}
.sw{width:44px;height:25px;background:#cbd5e1;border-radius:99px;
  position:relative;cursor:pointer;appearance:none;border:none;transition:.2s;flex-shrink:0}
.sw:checked{background:var(--acc)}
.sw::after{content:"";position:absolute;top:2.5px;left:2.5px;
  width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw:checked::after{left:21.5px}
.sw-label{font-size:13.5px;font-weight:600;cursor:pointer;user-select:none}
.color-row{display:flex;align-items:center;gap:8px}
.color-row input[type=color]{width:44px;height:40px;padding:3px;
  border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;flex-shrink:0}
.color-row input[type=text]{max-width:130px}
.char-counter{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}
.char-counter.over{color:var(--red);font-weight:700}

/* ─── Upload zone ─── */
.upload-zone{border:2px dashed rgba(0,159,227,.3);border-radius:10px;padding:18px;
  text-align:center;cursor:pointer;transition:.2s;color:var(--muted);font-size:13px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:var(--acc-l)}
.upload-zone input[type=file]{display:none}
.cover-preview{max-width:160px;max-height:110px;border-radius:10px;margin-top:10px;
  object-fit:cover;display:block;border:1px solid var(--border)}

/* ─── Modal ─── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;
  display:flex;align-items:flex-start;justify-content:center;padding:24px;
  overflow-y:auto;backdrop-filter:blur(5px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:680px;
  box-shadow:0 40px 80px rgba(0,0,0,.22);padding:32px;margin:auto}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.modal-head h3{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;color:var(--ink)}
.modal-close{background:rgba(15,23,42,.06);border:none;width:34px;height:34px;border-radius:9px;
  cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:.15s;flex-shrink:0}
.modal-close:hover{background:rgba(15,23,42,.12)}
.modal-foot{display:flex;gap:10px;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}
.modal-foot .spacer{flex:1}

/* ─── Toast ─── */
.toast{position:fixed;right:20px;bottom:20px;background:var(--dark2);color:#fff;
  padding:13px 20px;border-radius:12px;font-size:13px;font-weight:600;
  opacity:0;transform:translateY(10px);transition:.25s;z-index:200;
  box-shadow:0 8px 28px rgba(0,0,0,.22);pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:none}
.toast.err{background:var(--red)}

/* ─── Settings ─── */
.settings-form{max-width:640px}
.section-head{display:flex;align-items:center;gap:10px;padding:16px 0 12px;
  border-top:1px solid var(--border);margin-top:8px;cursor:pointer;user-select:none}
.section-head:first-child{border-top:none;margin-top:0}
.section-head-icon{font-size:20px}
.section-head-text h3{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:700;color:var(--ink)}
.section-head-text p{font-size:12px;color:var(--muted);margin-top:2px}
.section-arrow{margin-left:auto;color:var(--muted);font-size:16px;transition:.2s}
.section-open .section-arrow{transform:rotate(90deg)}
.section-body{padding-bottom:8px}

/* ─── Audit ─── */
.audit-row{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-s);font-size:12.5px}
.audit-row:last-child{border:none}
.audit-time{color:var(--muted);white-space:nowrap;font-size:11.5px;flex-shrink:0}
.audit-action{color:var(--acc);font-weight:700;flex-shrink:0}
.audit-detail{color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── Banner inline preview ─── */
.banner-prev{padding:10px 16px;text-align:center;font-weight:600;font-size:13px;border-radius:8px;margin-top:12px}

/* ─── Maintenance preview ─── */
.maint-prev{background:#0b1f33;color:#fff;border-radius:12px;padding:30px;text-align:center;margin-top:12px}
.maint-prev .mo{font-size:42px;margin-bottom:12px}

/* ─── Audit ─── */
code{background:var(--acc-l);color:var(--acc);padding:2px 7px;border-radius:6px;font-size:11.5px}

/* ─── Responsive ─── */
@media(max-width:700px){
  .sb{display:none}
  .page-body{padding:16px}
  .row2{flex-direction:column}
  .modal{padding:20px;border-radius:16px;margin:0}
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-width:100%}
  .content-grid{grid-template-columns:1fr 1fr}
  .stat-row{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .content-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap">
  <form id="loginForm" class="login-box">
    <div class="login-logo">
      <div class="login-icon">🦦</div>
      <div class="login-title">Blue Ferret</div>
    </div>
    <p class="login-sub">Панель керування · Введіть пароль</p>
    <label class="login-label">Пароль адміністратора</label>
    <input type="password" id="pw" class="login-input" autocomplete="current-password" required autofocus placeholder="••••••••">
    <button type="submit" class="login-btn" id="loginBtn">Увійти →</button>
    <p id="loginErr" class="login-err hidden"></p>
  </form>
</div>

<!-- APP -->
<div id="app" class="shell hidden">
  <aside class="sb">
    <div class="sb-brand">
      <div class="sb-icon">🦦</div>
      <div class="sb-name">Blue Ferret<small>CMS v4</small></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Огляд</div>
      <button class="sb-item" data-tab="dash">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Дашборд
      </button>
      <div class="sb-section">Контент</div>
      <button class="sb-item" data-tab="games">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        Ігри
        <span class="sb-badge" id="sb_games_cnt">0</span>
      </button>
      <button class="sb-item" data-tab="kik">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        КІК-проекти
        <span class="sb-badge" id="sb_kik_cnt">0</span>
      </button>
      <div class="sb-section">Налаштування</div>
      <button class="sb-item" data-tab="settings">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Налаштування
      </button>
      <div class="sb-section">Система</div>
      <button class="sb-item" data-tab="audit">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Журнал
      </button>
    </nav>
    <div class="sb-foot">
      <a class="sb-site" href="/" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
        Відкрити сайт
      </a>
      <button class="sb-logout" id="logoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Вийти
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <span>Blue Ferret</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        <b id="pageTitle">Дашборд</b>
      </div>
      <div id="topbarRight" style="display:flex;align-items:center;gap:10px"></div>
    </div>
    <div class="page-body" id="pageBody"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal" role="dialog">
    <div class="modal-head">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" id="modalClose" aria-label="Закрити">&times;</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-danger btn-sm hidden" id="modalDelete">Видалити</button>
      <div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" id="modalCancel">Скасувати</button>
      <button class="btn btn-primary btn-sm" id="modalSave">Зберегти</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirmBg" class="modal-bg hidden">
  <div class="modal" style="max-width:420px" role="alertdialog">
    <div class="modal-head"><h3 id="confirmTitle">Видалити?</h3></div>
    <p id="confirmText" style="color:var(--muted);font-size:14px;margin-bottom:8px"></p>
    <div class="modal-foot">
      <div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" id="confirmNo">Скасувати</button>
      <button class="btn btn-danger btn-sm" id="confirmYes">Видалити</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

const $ = (s, ctx = document) => ctx.querySelector(s);
let S = {}, gamesCache = [], kikCache = [];
let activeTab = 'dash';
let editType = null, editId = null;
let settingsDirty = false;
let confirmResolve = null;

/* ─── Helpers ─── */
function esc(x){ return String(x ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, isErr = false){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = 'toast', 2800);
}
async function api(method, url, body){
  const r = await fetch(url, {
    method,
    headers: body ? {'Content-Type':'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 401){ showLogin(); throw new Error('unauth'); }
  return r.json();
}
function confirm2(title, text){
  return new Promise(res => {
    confirmResolve = res;
    $('#confirmTitle').textContent = title;
    $('#confirmText').textContent = text;
    $('#confirmBg').classList.remove('hidden');
  });
}
$('#confirmYes').addEventListener('click', () => { $('#confirmBg').classList.add('hidden'); if (confirmResolve){ confirmResolve(true); confirmResolve=null; } });
$('#confirmNo').addEventListener('click', () => { $('#confirmBg').classList.add('hidden'); if (confirmResolve){ confirmResolve(false); confirmResolve=null; } });

function statusBadge(s){
  const map = {
    published: ['badge-green','Опубліковано'],
    active:    ['badge-green','Активний'],
    draft:     ['badge-yellow','Чернетка'],
    paused:    ['badge-yellow','Призупинено'],
    archived:  ['badge-gray','Архів'],
    ended:     ['badge-gray','Завершено'],
  };
  const [cls, lbl] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function updateBadges(){
  $('#sb_games_cnt').textContent = gamesCache.length;
  $('#sb_kik_cnt').textContent = kikCache.length;
}

/* ─── Sidebar ─── */
$('.sb-nav').addEventListener('click', e => {
  const b = e.target.closest('[data-tab]');
  if (b) switchTab(b.dataset.tab);
});
$('#logoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin/logout',{method:'POST'}).catch(()=>{});
  toast('Ви вийшли з системи');
  setTimeout(showLogin, 300);
});

function switchTab(id){
  activeTab = id;
  document.querySelectorAll('.sb-item').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  const labels = {dash:'Дашборд',games:'Ігри',kik:'КІК-проекти',settings:'Налаштування',audit:'Журнал дій'};
  $('#pageTitle').textContent = labels[id] || id;
  $('#topbarRight').innerHTML = '';
  settingsDirty = false;
  render();
}

/* ─── Render dispatcher ─── */
function render(){
  const b = $('#pageBody');
  if (activeTab === 'dash')     b.innerHTML = renderDash();
  else if (activeTab === 'games')    renderGamesPage();
  else if (activeTab === 'kik')      renderKikPage();
  else if (activeTab === 'settings') renderSettingsPage();
  else if (activeTab === 'audit')    renderAuditPage();
}

/* ─── DASHBOARD ─── */
function renderDash(){
  const g = S.general || {};
  const bannerOn = (S.banner || {}).enabled;
  const maintOn  = (S.maintenance || {}).enabled;
  const statusLabel = maintOn ? '<span class="badge badge-yellow">Тех. режим</span>'
    : bannerOn ? '<span class="badge badge-green">Із банером</span>'
    : '<span class="badge badge-green">Працює</span>';

  return `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${gamesCache.length}</div><div class="stat-label">Ігор опубліковано</div></div>
      <div class="stat-card"><div class="stat-num">${kikCache.length}</div><div class="stat-label">КІК-проектів</div></div>
      <div class="stat-card" style="display:flex;flex-direction:column;justify-content:center">
        <div class="stat-label" style="margin-bottom:6px">Стан сайту</div>
        ${statusLabel}
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-head-text"><h2>Швидкі дії</h2><p>Найпоширеніші операції</p></div>
      </div>
      <div class="qa-row">
        <button class="btn btn-primary" onclick="switchTab('games');setTimeout(openGameModal,50,null)">+ Нова гра</button>
        <button class="btn btn-kik" onclick="switchTab('kik');setTimeout(openKikModal,50,null)">+ Новий КІК-проект</button>
        <button class="btn btn-ghost" onclick="switchTab('settings')">⚙ Налаштування сайту</button>
      </div>
    </div>
    ${gamesCache.length ? `<div class="card">
      <div class="card-head"><div class="card-head-text"><h2>Останні ігри</h2></div>
        <button class="btn btn-ghost btn-sm" onclick="switchTab('games')">Усі ігри →</button>
      </div>
      <div class="content-grid">${gamesCache.slice(0,3).map(g=>gameCard(g,true)).join('')}</div>
    </div>` : ''}
  `;
}

/* ─── GAMES ─── */
function renderGamesPage(){
  const pb = $('#pageBody');
  const tb = $('#topbarRight');
  tb.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openGameModal(null)">+ Додати гру</button>`;

  if (!gamesCache.length){
    pb.innerHTML = `<div class="empty">
      <div class="empty-icon">🎲</div>
      <div class="empty-text">Ігор поки немає</div>
      <div class="empty-hint">Додайте першу гру — вона з'явиться на сайті одразу після збереження</div>
      <button class="btn btn-primary" onclick="openGameModal(null)">+ Додати першу гру</button>
    </div>`;
    return;
  }

  pb.innerHTML = `<div class="card">
    <div class="card-head">
      <div class="card-head-text"><h2>Каталог ігор</h2><p>${gamesCache.length} ${plural(gamesCache.length,'гра','гри','ігор')} · натисніть картку для редагування</p></div>
      <button class="btn btn-primary btn-sm" onclick="openGameModal(null)">+ Додати</button>
    </div>
    <div class="content-grid">${gamesCache.map(g=>gameCard(g,false)).join('')}</div>
  </div>`;
}

function gameCard(g, small){
  const cover = g.cover_url
    ? `<div class="item-cover" style="position:relative"><img src="${esc(g.cover_url)}" loading="lazy" onerror="this.style.display='none'"></div>`
    : `<div class="item-cover">🎲</div>`;
  const chars = [g.players,g.age,g.duration].filter(Boolean).join(' · ');
  return `<div class="item-card" onclick="openGameModal(${g.id})">
    ${cover}
    <div class="item-body">
      <div class="item-title">${esc(g.title)}</div>
      ${g.subtitle ? `<div class="item-sub">${esc(g.subtitle)}</div>` : ''}
      ${chars ? `<div style="font-size:11.5px;color:var(--muted);margin-top:4px;margin-bottom:6px">${esc(chars)}</div>` : ''}
      <div class="item-foot">${statusBadge(g.status)}<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openGameModal(${g.id})">Редагувати</button></div>
    </div>
  </div>`;
}

function openGameModal(id){
  editType = 'game'; editId = id;
  const g = id ? (gamesCache.find(x=>x.id===id)||{}) : {};
  $('#modalTitle').textContent = id ? `✏️ ${g.title || 'Редагувати гру'}` : '+ Нова гра';
  $('#modalDelete').classList.toggle('hidden', !id);
  const descLen = (g.description||'').length;

  $('#modalBody').innerHTML = `
    <div class="row2">
      <div class="field">
        <label>Назва гри *</label>
        <input type="text" id="mf_title" value="${esc(g.title||'')}" placeholder="Наприклад: Кухня шефа" required>
      </div>
      <div class="field" style="max-width:180px">
        <label>URL-ключ (slug)</label>
        <input type="text" id="mf_slug" value="${esc(g.slug||'')}" placeholder="kuhnya-shefa">
        <span class="hint">Автозаповнюється з назви</span>
      </div>
    </div>
    <div class="field">
      <label>Підзаголовок</label>
      <input type="text" id="mf_subtitle" value="${esc(g.subtitle||'')}" placeholder="Коротко про гру">
    </div>
    <div class="field">
      <label>Опис</label>
      <textarea id="mf_description" placeholder="Детальний опис гри для сторінки товару…">${esc(g.description||'')}</textarea>
      <div class="char-counter ${descLen>500?'over':''}" id="mf_descCount">${descLen} / 500</div>
    </div>
    <div class="field">
      <label>Обкладинка</label>
      <div class="upload-zone" id="uploadZone" onclick="$('#mf_file').click()">
        <input type="file" id="mf_file" accept="image/*">
        📷 Натисніть для завантаження фото або перетягніть файл сюди
      </div>
      <input type="url" id="mf_cover_url" value="${esc(g.cover_url||'')}" placeholder="або вставте посилання на фото" style="margin-top:8px">
      ${g.cover_url ? `<img class="cover-preview" id="coverPreview" src="${esc(g.cover_url)}">` : `<div id="coverPreview"></div>`}
    </div>
    <div class="row2">
      <div class="field">
        <label>Кількість гравців</label>
        <input type="text" id="mf_players" value="${esc(g.players||'')}" placeholder="2–5">
      </div>
      <div class="field">
        <label>Вік</label>
        <input type="text" id="mf_age" value="${esc(g.age||'')}" placeholder="12+">
      </div>
      <div class="field">
        <label>Тривалість</label>
        <input type="text" id="mf_duration" value="${esc(g.duration||'')}" placeholder="30–60 хв">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Посилання «Купити»</label>
        <input type="url" id="mf_buy_url" value="${esc(g.buy_url||'')}" placeholder="https://rozetka.com.ua/...">
      </div>
      <div class="field" style="max-width:180px">
        <label>Статус</label>
        <select id="mf_status">
          <option value="published" ${(g.status||'published')==='published'?'selected':''}>✅ Опубліковано</option>
          <option value="draft" ${g.status==='draft'?'selected':''}>📝 Чернетка</option>
          <option value="archived" ${g.status==='archived'?'selected':''}>📦 Архів</option>
        </select>
      </div>
    </div>`;

  setupUploadZone('mf_cover_url', 'coverPreview');
  setupGameAids();
  $('#modalBg').classList.remove('hidden');
  setTimeout(()=>$('#mf_title')?.focus(), 50);
}

function setupGameAids(){
  const title = $('#mf_title'), slug = $('#mf_slug');
  title?.addEventListener('input', () => {
    if (!slug.value.trim() || slug.dataset.auto === '1'){
      slug.dataset.auto = '1';
      slug.value = slugify(title.value);
    }
  });
  slug?.addEventListener('input', () => slug.dataset.auto = '');
  const desc = $('#mf_description'), cnt = $('#mf_descCount');
  desc?.addEventListener('input', () => {
    const n = desc.value.length;
    cnt.textContent = n + ' / 500';
    cnt.classList.toggle('over', n > 500);
  });
  $('#mf_cover_url')?.addEventListener('input', e => { if (e.target.value.trim()) showCoverPreview(e.target.value.trim()); });
}

/* ─── KIK ─── */
function renderKikPage(){
  const pb = $('#pageBody');
  const tb = $('#topbarRight');
  tb.innerHTML = `<button class="btn btn-kik btn-sm" onclick="openKikModal(null)">+ Новий проект</button>`;

  if (!kikCache.length){
    pb.innerHTML = `<div class="empty">
      <div class="empty-icon">🚀</div>
      <div class="empty-text">КІК-проектів поки немає</div>
      <div class="empty-hint">Додайте краудфандингову кампанію — вона відразу з'явиться на сторінці /kik</div>
      <button class="btn btn-kik" onclick="openKikModal(null)">+ Додати перший проект</button>
    </div>`;
    return;
  }

  pb.innerHTML = `<div class="card">
    <div class="card-head">
      <div class="card-head-text"><h2>КІК-проекти</h2><p>${kikCache.length} ${plural(kikCache.length,'проект','проекти','проектів')} · натисніть для редагування</p></div>
      <button class="btn btn-kik btn-sm" onclick="openKikModal(null)">+ Новий</button>
    </div>
    <div class="content-grid">${kikCache.map(k=>kikCard(k)).join('')}</div>
  </div>`;
}

function kikCard(k){
  const pct = k.goal ? Math.min(100, Math.round(k.raised / k.goal * 100)) : 0;
  const cover = k.cover_url
    ? `<div class="item-cover" style="position:relative"><img src="${esc(k.cover_url)}" loading="lazy" onerror="this.style.display='none'"></div>`
    : `<div class="item-cover" style="background:var(--kik-l)">🚀</div>`;
  return `<div class="item-card" onclick="openKikModal(${k.id})">
    ${cover}
    <div class="item-body">
      <div class="item-title">${esc(k.title)}</div>
      ${k.subtitle ? `<div class="item-sub">${esc(k.subtitle)}</div>` : ''}
      <div style="font-size:12px;color:var(--muted);margin-top:4px">
        ${k.raised.toLocaleString('uk')} / ${k.goal.toLocaleString('uk')} ₴ · ${k.backers} бекерів
      </div>
      <div class="prog"><div class="prog-bar" style="width:${pct}%"></div></div>
      <div class="item-foot" style="margin-top:10px">${statusBadge(k.status)}
        <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openKikModal(${k.id})">Редагувати</button>
      </div>
    </div>
  </div>`;
}

function openKikModal(id){
  editType = 'kik'; editId = id;
  const k = id ? (kikCache.find(x=>x.id===id)||{}) : {};
  $('#modalTitle').textContent = id ? `✏️ ${k.title || 'Редагувати проект'}` : '+ Новий КІК-проект';
  $('#modalDelete').classList.toggle('hidden', !id);
  const endsVal = k.ends_at ? new Date(k.ends_at).toISOString().slice(0,10) : '';
  $('#modalSave').className = 'btn btn-kik btn-sm';

  $('#modalBody').innerHTML = `
    <div class="field">
      <label>Назва проекту *</label>
      <input type="text" id="mf_title" value="${esc(k.title||'')}" placeholder="Наприклад: Підтримати «Кухню шефа»" required>
    </div>
    <div class="field">
      <label>Підзаголовок</label>
      <input type="text" id="mf_subtitle" value="${esc(k.subtitle||'')}" placeholder="Коротко про проект">
    </div>
    <div class="field">
      <label>Опис</label>
      <textarea id="mf_description" placeholder="Детальний опис кампанії…">${esc(k.description||'')}</textarea>
    </div>
    <div class="field">
      <label>Фото обкладинки</label>
      <div class="upload-zone" id="uploadZone" onclick="$('#mf_file').click()">
        <input type="file" id="mf_file" accept="image/*">
        📷 Завантажте фото або перетягніть сюди
      </div>
      <input type="url" id="mf_cover_url" value="${esc(k.cover_url||'')}" placeholder="або вставте посилання" style="margin-top:8px">
      ${k.cover_url ? `<img class="cover-preview" id="coverPreview" src="${esc(k.cover_url)}">` : `<div id="coverPreview"></div>`}
    </div>
    <div class="row2">
      <div class="field">
        <label>Ціль збору, ₴</label>
        <input type="number" id="mf_goal" value="${k.goal||0}" min="0">
      </div>
      <div class="field">
        <label>Зібрано, ₴</label>
        <input type="number" id="mf_raised" value="${k.raised||0}" min="0">
      </div>
      <div class="field">
        <label>Кількість бекерів</label>
        <input type="number" id="mf_backers" value="${k.backers||0}" min="0">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Посилання на кампанію</label>
        <input type="url" id="mf_campaign_url" value="${esc(k.campaign_url||'')}" placeholder="https://kik.ua/...">
      </div>
      <div class="field" style="max-width:180px">
        <label>Дата закінчення</label>
        <input type="date" id="mf_ends_at" value="${endsVal}">
      </div>
    </div>
    <div class="field" style="max-width:200px">
      <label>Статус</label>
      <select id="mf_status">
        <option value="active" ${(k.status||'active')==='active'?'selected':''}>🟢 Активний</option>
        <option value="paused" ${k.status==='paused'?'selected':''}>⏸ Призупинено</option>
        <option value="ended" ${k.status==='ended'?'selected':''}>🏁 Завершено</option>
      </select>
    </div>`;

  setupUploadZone('mf_cover_url', 'coverPreview');
  $('#modalBg').classList.remove('hidden');
  setTimeout(()=>$('#mf_title')?.focus(), 50);
}

/* ─── SETTINGS ─── */
let settingsS = null;

function renderSettingsPage(){
  settingsS = JSON.parse(JSON.stringify(S));
  const pb = $('#pageBody');
  const tb = $('#topbarRight');
  const stamp = S.general?.publishedAt ? `Збережено: ${new Date(S.general.publishedAt).toLocaleString('uk-UA')}` : '';
  tb.innerHTML = `<span id="savedAt" style="font-size:12px;color:var(--muted)">${stamp}</span>
    <button class="btn btn-primary btn-sm" id="settingsSaveBtn">Зберегти і опублікувати</button>`;
  $('#settingsSaveBtn').addEventListener('click', saveAllSettings);

  const g = settingsS.general || {};
  const hp = settingsS.homepage || {};
  const b = settingsS.banner || {};
  const m = settingsS.maintenance || {};
  const c = settingsS.contacts || {};
  const seo = settingsS.seo || {};
  const ig = settingsS.integrations || {};
  const ap = settingsS.appearance || {};

  pb.innerHTML = `<div class="settings-form">

    <!-- GENERAL -->
    <div class="section-head section-open" data-section="general">
      <div class="section-head-icon">⚙️</div>
      <div class="section-head-text"><h3>Загальне</h3><p>Назва сайту, акцентний колір</p></div>
      <span class="section-arrow">›</span>
    </div>
    <div class="section-body" data-body="general">
      <div class="field"><label>Назва сайту</label>
        <input type="text" data-s="general.siteTitle" value="${esc(g.siteTitle||'Blue Ferret')}"></div>
      <div class="field"><label>Гасло (підзаголовок)</label>
        <input type="text" data-s="general.tagline" value="${esc(g.tagline||'')}"></div>
      <div class="field"><label>Основний колір</label>
        <div class="color-row">
          <input type="color" data-s="general.primaryColor" value="${g.primaryColor||'#009fe3'}">
          <input type="text" data-s="general.primaryColor" value="${esc(g.primaryColor||'#009fe3')}" style="max-width:130px">
        </div>
      </div>
    </div>

    <!-- HOMEPAGE -->
    <div class="section-head" data-section="homepage">
      <div class="section-head-icon">🏠</div>
      <div class="section-head-text"><h3>Головна сторінка</h3><p>Заголовок, підзаголовок, кнопка</p></div>
      <span class="section-arrow">›</span>
    </div>
    <div class="section-body hidden" data-body="homepage">
      <div class="field"><label>Заголовок (H1)</label>
        <input type="text" data-s="homepage.heroTitle" value="${esc(hp.heroTitle||'')}" placeholder="Blue Ferret"></div>
      <div class="field"><label>Підзаголовок</label>
        <input type="text" data-s="homepage.heroSubtitle" value="${esc(hp.heroSubtitle||'')}" placeholder="Незалежне видавництво…"></div>

  // Section accordion
  document.querySelectorAll('.section-head').forEach(h => {

      const open = !h.classList.contains('section-open');
      h.classList.toggle('section-open', open);
      body.classList.toggle('hidden', !open);
    });
  });

  // Color pair sync + banner/maint preview
  document.querySelectorAll('[data-s]').forEach(el => {
    el.addEventListener('input', () => {
      const path = el.dataset.s;
      if (el.type === 'color' || el.type === 'text'){
        document.querySelectorAll(`[data-s="${path}"]`).forEach(o => { if (o!==el) o.value = el.value; });
      }
      // live previews
      if (path === 'banner.text') { const b=$('#ip_banner'); if(b) b.textContent=el.value||'Тут з'явиться текст вашого банера'; }
      if (path === 'banner.bg') { const b=$('#ip_banner'); if(b) b.style.background=el.value; }
      if (path === 'banner.fg') { const b=$('#ip_banner'); if(b) b.style.color=el.value; }
      if (path === 'maintenance.message') { const m=$('#ip_maint'); if(m) m.textContent=el.value; }
    });
    el.addEventListener('change', () => settingsDirty = true);
    el.addEventListener('input', () => settingsDirty = true);
  });

  // Cmd+S
  document.addEventListener('keydown', kbHandler);
}

function kbHandler(e){
  if ((e.metaKey||e.ctrlKey) && (e.key==='s'||e.key==='S') && activeTab==='settings'){
    e.preventDefault(); saveAllSettings();
  }
}

function collectSettings(){
  document.querySelectorAll('[data-s]').forEach(el => {
    const [k, f] = el.dataset.s.split('.');
    if (!settingsS[k]) settingsS[k] = {};
    if (el.type === 'checkbox') settingsS[k][f] = el.checked;
    else settingsS[k][f] = el.value;
  });
}

async function saveAllSettings(){
  const btn = $('#settingsSaveBtn');
  if (!btn) return;
  collectSettings();
  btn.disabled = true; btn.textContent = 'Зберігаю…';
  try {
    const res = await api('PUT', '/api/admin/settings', settingsS);
    S = res.settings;
    settingsS = JSON.parse(JSON.stringify(S));
    settingsDirty = false;
    toast('Збережено і опубліковано ✓');
    const t = S.general?.publishedAt;
    const savedAt = $('#savedAt');
    if (savedAt && t) savedAt.textContent = 'Збережено: ' + new Date(t).toLocaleString('uk-UA');
  } catch(e){ if (e.message!=='unauth') toast('Помилка збереження', true); }
  finally { if (btn){ btn.disabled=false; btn.textContent='Зберегти і опублікувати'; } }
}

/* ─── AUDIT ─── */
function renderAuditPage(){
  $('#pageBody').innerHTML = `<div class="card">
    <div class="card-head"><div class="card-head-text"><h2>Журнал дій</h2><p>Останні 100 змін</p></div></div>
    <div id="auditList" style="color:var(--muted);font-size:13px">Завантаження…</div>
  </div>`;
  loadAudit();
}

const actionLabels = {
  login_ok:'Вхід', login_fail:'Невдалий вхід', logout:'Вихід',
  settings_save:'Налаштування збережено',
  game_create:'Гру додано', game_update:'Гру змінено', game_delete:'Гру видалено',
  kik_create:'КІК-проект додано', kik_update:'КІК-проект змінено', kik_delete:'КІК-проект видалено',
  upload:'Файл завантажено',
};

async function loadAudit(){
  try {
    const rows = await api('GET', '/api/admin/audit');
    const box = $('#auditList');
    if (!box) return;
    box.innerHTML = rows.length
      ? rows.map(r => `<div class="audit-row">
          <span class="audit-time">${new Date(r.ts).toLocaleString('uk-UA')}</span>
          <span class="audit-action">${actionLabels[r.action] || r.action}</span>
          <span class="audit-detail">${esc(r.detail||'')}</span>
        </div>`).join('')
      : '<p>Журнал порожній</p>';
  } catch(e){}
}

/* ─── Upload ─── */
function setupUploadZone(urlFieldId, previewId){
  const zone = $('#uploadZone'), fileInput = $('#mf_file');
  if (!zone||!fileInput) return;
  fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0], urlFieldId, previewId); });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0], urlFieldId, previewId);
  });
}

async function uploadFile(file, urlFieldId, previewId){
  toast('Завантажую…');
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const r = await api('POST', '/api/admin/upload', { filename: file.name, data: e.target.result });
      if (r.url){
        const f = document.getElementById(urlFieldId);
        if (f) f.value = r.url;
        showCoverPreview(r.url, previewId);
        toast('Фото завантажено ✓');
      } else toast('Помилка', true);
    } catch { toast('Помилка завантаження', true); }
  };
  reader.readAsDataURL(file);
}

function showCoverPreview(url, id = 'coverPreview'){
  let p = document.getElementById(id);
  if (!p) return;
  if (p.tagName === 'IMG') p.src = url;
  else p.outerHTML = `<img class="cover-preview" id="${id}" src="${esc(url)}">`;
}

/* ─── Modal save/delete ─── */
$('#modalSave').addEventListener('click', modalSave);
$('#modalDelete').addEventListener('click', modalDeleteClick);
$('#modalClose').addEventListener('click', closeModal);
$('#modalCancel').addEventListener('click', closeModal);
$('#modalBg').addEventListener('click', e => { if (e.target === $('#modalBg')) closeModal(); });

async function modalSave(){
  const btn = $('#modalSave');
  btn.disabled = true;
  try {
    if (editType === 'game'){
      const body = {
        title: $('#mf_title').value.trim(),
        slug: $('#mf_slug').value.trim() || slugify($('#mf_title').value),
        subtitle: $('#mf_subtitle').value,
        description: $('#mf_description').value,
        status: $('#mf_status').value,
        cover_url: $('#mf_cover_url').value,
        players: $('#mf_players').value,
        age: $('#mf_age').value,
        duration: $('#mf_duration').value,
        buy_url: $('#mf_buy_url').value,
      };
      if (!body.title){ toast('Введіть назву гри', true); return; }
      if (editId) await api('PUT', `/api/admin/games/${editId}`, body);
      else await api('POST', '/api/admin/games', body);
      gamesCache = await api('GET', '/api/admin/games');
      toast(editId ? 'Гру оновлено ✓' : 'Гру додано ✓');
    } else {
      const endsRaw = $('#mf_ends_at').value;
      const body = {
        title: $('#mf_title').value.trim(),
        subtitle: $('#mf_subtitle').value,
        description: $('#mf_description').value,
        status: $('#mf_status').value,
        goal: Number($('#mf_goal').value)||0,
        raised: Number($('#mf_raised').value)||0,
        backers: Number($('#mf_backers').value)||0,
        cover_url: $('#mf_cover_url').value,
        campaign_url: $('#mf_campaign_url').value,
        ends_at: endsRaw ? new Date(endsRaw).getTime() : null,
      };
      if (!body.title){ toast('Введіть назву проекту', true); return; }
      if (editId) await api('PUT', `/api/admin/kik/${editId}`, body);
      else await api('POST', '/api/admin/kik', body);
      kikCache = await api('GET', '/api/admin/kik');
      toast(editId ? 'Проект оновлено ✓' : 'Проект додано ✓');
    }
    closeModal(); updateBadges(); render();
  } catch(e){ if (e.message!=='unauth') toast('Помилка збереження', true); }
  finally { if (btn) { btn.disabled=false; btn.className='btn btn-primary btn-sm'; } }
}

async function modalDeleteClick(){
  const name = editType==='game'
    ? (gamesCache.find(x=>x.id===editId)||{}).title || 'гру'
    : (kikCache.find(x=>x.id===editId)||{}).title || 'проект';
  const ok = await confirm2('Видалити назавжди?', `«${name}» буде видалено безповоротно.`);
  if (!ok) return;
  try {
    if (editType==='game'){
      await api('DELETE', `/api/admin/games/${editId}`);
      gamesCache = await api('GET', '/api/admin/games');
      toast('Гру видалено');
    } else {
      await api('DELETE', `/api/admin/kik/${editId}`);
      kikCache = await api('GET', '/api/admin/kik');
      toast('Проект видалено');
    }
    closeModal(); updateBadges(); render();
  } catch(e){ if (e.message!=='unauth') toast('Помилка', true); }
}

function closeModal(){
  $('#modalBg').classList.add('hidden');
  $('#modalSave').className = 'btn btn-primary btn-sm';
  editType = null; editId = null;
}

/* ─── Utils ─── */
function slugify(s){
  return String(s||'').toLowerCase().trim()
    .replace(/[^a-zа-яіїєґ0-9]+/gi,'-').replace(/^-|-$/g,'');
}

function plural(n, one, few, many){
  const m = n % 100;
  if (m >= 11 && m <= 19) return many;
  const r = n % 10;
  if (r === 1) return one;
  if (r >= 2 && r <= 4) return few;
  return many;
}

/* ─── Auth ─── */
function showApp(){ $('#login').classList.add('hidden'); $('#app').classList.remove('hidden'); }
function showLogin(){
  $('#app').classList.add('hidden');
  $('#login').classList.remove('hidden');
  $('#pw').value = '';
  setTimeout(() => $('#pw').focus(), 50);
}

$('#loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('#loginBtn'); btn.disabled = true; btn.textContent = 'Входжу…';
  $('#loginErr').classList.add('hidden');
  try {
    const r = await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('#pw').value})});
    if (r.ok){ await boot(); }
    else {
      const j = await r.json().catch(()=>({}));
      const msg = j.error==='too_many_attempts' ? 'Забагато спроб. Зачекайте 10 хвилин.' : 'Невірний пароль';
      $('#loginErr').textContent = msg;
      $('#loginErr').classList.remove('hidden');
    }
  } catch { $('#loginErr').textContent = 'Помилка з\'єднання'; $('#loginErr').classList.remove('hidden'); }
  finally { btn.disabled=false; btn.textContent='Увійти →'; }
});

/* ─── Boot ─── */
async function boot(){
  try {
    const me = await fetch('/api/admin/me').then(r=>r.json()).catch(()=>({authenticated:false}));
    if (!me.authenticated){ showLogin(); return; }
    [S, gamesCache, kikCache] = await Promise.all([
      api('GET','/api/admin/settings'),
      api('GET','/api/admin/games'),
      api('GET','/api/admin/kik'),
    ]);
    showApp();
    updateBadges();
    switchTab('dash');
  } catch { showLogin(); }
}

window.openGameModal = id => openGameModal(id);
window.openKikModal = id => openKikModal(id);
window.switchTab = t => switchTab(t);
window.$ = $;

boot();
</script>
