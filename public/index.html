<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Blue Ferret — Адмінка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --acc:#009fe3;--acc-h:#0077b3;--acc-m:rgba(0,159,227,.12);
  --kik:#4bb272;--kik-h:#3a9960;--kik-m:rgba(75,178,114,.12);
  --bg:#f1f5f9;--card:#fff;
  --dark:#0f172a;--dark-8:#1e293b;--dark-7:#334155;
  --border:rgba(15,23,42,.1);--border-s:rgba(15,23,42,.06);
  --txt:#1e293b;--muted:#64748b;
  --red:#e11d48;--green:#16a34a;
  --sb:240px;--pv:380px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Comfortaa',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
a{color:var(--acc)}
.hidden{display:none!important}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:var(--dark);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 80%,rgba(0,159,227,.18) 0%,transparent 55%),
    radial-gradient(ellipse 70% 40% at 80% 20%,rgba(75,178,114,.14) 0%,transparent 55%)}
.login-box{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:40px;
  width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.45)}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:24px}
.login-dot{width:36px;height:36px;border-radius:11px;background:var(--acc);flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,159,227,.4)}
.login-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;line-height:1.2}
.login-title small{display:block;font-family:'Comfortaa',sans-serif;font-size:11px;
  color:rgba(255,255,255,.4);font-weight:400;margin-top:2px;letter-spacing:.04em}
.login-sub{color:rgba(255,255,255,.45);font-size:13px;text-align:center;margin-bottom:28px}
.login-box label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:7px}
.login-box input{width:100%;padding:13px 15px;border:1.5px solid rgba(255,255,255,.14);border-radius:12px;
  font-family:'Comfortaa',sans-serif;font-size:14px;background:rgba(255,255,255,.08);color:#fff;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,159,227,.22)}
.login-box input::placeholder{color:rgba(255,255,255,.28)}
.login-btn{width:100%;margin-top:18px;background:var(--acc);color:#fff;border:none;
  padding:14px;border-radius:12px;font-family:'Comfortaa',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,159,227,.35)}
.login-btn:hover{background:var(--acc-h);box-shadow:0 6px 20px rgba(0,159,227,.45)}
.login-btn:disabled{opacity:.5;cursor:default}
.login-err{color:#f87171;font-size:13px;text-align:center;margin-top:14px}

/* ── Shell ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:var(--sb);flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.05);overflow-y:auto}
.sb-brand{padding:18px 16px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sb-dot{width:30px;height:30px;border-radius:9px;background:var(--acc);flex-shrink:0;
  box-shadow:0 3px 12px rgba(0,159,227,.4)}
.sb-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.sb-name small{display:block;font-family:'Comfortaa',sans-serif;font-size:10px;
  color:rgba(255,255,255,.35);font-weight:400;letter-spacing:.04em}
.sb-nav{padding:10px 8px;flex:1}
.sb-group-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.28);padding:14px 12px 5px}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.5);font-family:'Comfortaa',sans-serif;font-size:13px;font-weight:600;
  transition:.15s;border:none;background:none;width:100%;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.82)}
.sb-btn.active{background:rgba(0,159,227,.16);color:var(--acc)}
.sb-btn svg{flex-shrink:0;opacity:.65}
.sb-btn.active svg{opacity:1}
.sb-badge{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);
  font-size:10.5px;font-weight:700;min-width:20px;text-align:center;padding:2px 7px;border-radius:99px}
.sb-btn.active .sb-badge{background:rgba(0,159,227,.28);color:#fff}
.sb-footer{padding:10px 8px 16px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sb-site-link{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;
  color:rgba(255,255,255,.4);font-size:12.5px;font-family:'Comfortaa',sans-serif;
  text-decoration:none;transition:.15s}
.sb-site-link:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.sb-logout{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.4);font-size:13px;font-family:'Comfortaa',sans-serif;font-weight:600;
  transition:.15s;border:none;background:none;width:100%;text-align:left}
.sb-logout:hover{background:rgba(239,68,68,.14);color:#f87171}

/* ── Main area ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.main-topbar{position:sticky;top:0;z-index:10;background:rgba(241,245,249,.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:13px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.breadcrumb b{color:var(--txt);font-weight:700}
.breadcrumb svg{opacity:.35}
.topbar-right{display:flex;align-items:center;gap:12px}
.saved-stamp{font-size:12px;color:var(--muted)}
.save-wrap{position:relative}
.save-dot{position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:50%;
  background:#facc15;border:2px solid var(--bg);box-shadow:0 0 0 2px rgba(250,204,21,.3);display:none}
.save-wrap.dirty .save-dot{display:block}
.main-body{padding:28px;max-width:920px;width:100%}

/* ── Preview panel ── */
.preview-pane{width:var(--pv);flex-shrink:0;background:var(--dark);
  border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden}
.preview-pane.collapsed{display:none}
.pv-head{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;
  align-items:center;justify-content:space-between;flex-shrink:0}
.pv-head h3{font-family:'Comfortaa',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.55)}
.pv-head .pv-tag{font-size:10px;color:rgba(255,255,255,.32);font-weight:600}
.pv-body{flex:1;overflow-y:auto;padding:18px}
.pv-frame{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.3);
  font-family:'Comfortaa',sans-serif}
.pv-browserbar{background:#e2e8f0;padding:8px 12px;display:flex;align-items:center;gap:6px}
.pv-browserbar i{width:9px;height:9px;border-radius:50%;background:#cbd5e1;display:block}
.pv-browserbar .pv-url{margin-left:8px;background:#fff;border-radius:6px;font-size:10.5px;
  color:#94a3b8;padding:3px 10px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pv-content{padding:18px}
.pv-empty{color:rgba(255,255,255,.35);font-size:13px;text-align:center;padding:40px 20px;line-height:1.7}
.pv-hint{margin-top:14px;font-size:11px;color:rgba(255,255,255,.3);text-align:center;line-height:1.6}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;
  margin-bottom:20px;box-shadow:0 1px 4px rgba(15,23,42,.04)}
.card-head{margin-bottom:20px}
.card-head h2{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;color:var(--dark-8)}
.card-head p{margin-top:5px;color:var(--muted);font-size:12.5px}

/* ── Inline preview blocks inside cards ── */
.inline-pv{margin-top:18px;border-top:1px dashed var(--border);padding-top:16px}
.inline-pv-label{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.inline-pv-label::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--acc)}
.pv-banner-strip{padding:10px 16px;text-align:center;font-weight:600;font-size:13px;border-radius:8px}
.pv-color-row{display:flex;align-items:center;gap:14px}
.pv-color-dot{width:48px;height:48px;border-radius:12px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.pv-color-hex{font-family:ui-monospace,monospace;font-size:14px;font-weight:700;color:var(--dark-8)}
.pv-color-sample{font-size:14px;font-weight:700;margin-top:4px}
.pv-hero{border-radius:14px;padding:26px 22px;color:#fff;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);position:relative;overflow:hidden}
.pv-hero::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 80% 10%,rgba(0,159,227,.35),transparent 60%);pointer-events:none}
.pv-hero h4{font-family:'Libre Baskerville',serif;font-size:22px;line-height:1.2;margin-bottom:8px;position:relative}
.pv-hero p{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:16px;position:relative}
.pv-hero .pv-cta{display:inline-block;background:var(--acc);color:#fff;font-weight:700;font-size:13px;
  padding:9px 20px;border-radius:9px;position:relative}
.pv-maint{border-radius:14px;padding:30px 22px;text-align:center;
  background:#0b1f33;color:#fff}
.pv-maint .pv-otter{font-size:40px;margin-bottom:12px}
.pv-maint p{font-size:14px;color:rgba(255,255,255,.85);line-height:1.6}
.pv-css-demo{border:1px solid var(--border);border-radius:12px;padding:18px;background:#fff}

/* ── Form ── */
.field{margin-bottom:16px}
.field>label,.field-label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--dark-7);margin-bottom:7px}
.field .note{display:block;font-size:11.5px;color:var(--muted);margin-top:5px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>.field{flex:1;min-width:170px}
.char-counter{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}
.char-counter.over{color:var(--red);font-weight:700}

input[type=text],input[type=url],input[type=email],input[type=password],
input[type=number],input[type=date],textarea,select{
  width:100%;padding:11px 13px;
  border:1.5px solid rgba(15,23,42,.13);border-radius:10px;
  font-family:'Comfortaa',sans-serif;font-size:13.5px;
  background:#fff;color:var(--txt);transition:.15s;outline:none}
input:focus,textarea:focus,select:focus{
  border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-m)}
textarea{min-height:100px;resize:vertical;
  font-family:ui-monospace,'Menlo','Consolas',monospace;font-size:12.5px}
.switch-row{display:flex;align-items:center;gap:10px}
.switch-input{width:44px;height:25px;background:#cbd5e1;border-radius:99px;
  position:relative;cursor:pointer;appearance:none;border:none;transition:.2s;flex-shrink:0}
.switch-input:checked{background:var(--acc)}
.switch-input::after{content:"";position:absolute;top:2.5px;left:2.5px;
  width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;
  box-shadow:0 1px 3px rgba(0,0,0,.22)}
.switch-input:checked::after{left:21.5px}
.switch-label{font-size:13.5px;font-weight:600;cursor:pointer;user-select:none}
.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type=color]{width:44px;height:40px;padding:3px;
  border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;flex-shrink:0}
.color-row input[type=text]{max-width:140px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;padding:11px 20px;
  border-radius:10px;font-family:'Comfortaa',sans-serif;font-size:13.5px;font-weight:700;
  cursor:pointer;transition:.15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--acc);color:#fff;box-shadow:0 3px 12px rgba(0,159,227,.28)}
.btn-primary:hover{background:var(--acc-h);box-shadow:0 4px 16px rgba(0,159,227,.38)}
.btn-ghost{background:#fff;color:var(--txt);border:1.5px solid rgba(15,23,42,.14)}
.btn-ghost:hover{border-color:rgba(15,23,42,.24);background:#f8fafc}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c01040}
.btn-kik{background:var(--kik);color:#fff}
.btn-kik:hover{background:var(--kik-h)}
.btn-sm{padding:7px 14px;font-size:12.5px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:default!important}

/* ── Table / List ── */
.list-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.list-header h2{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;color:var(--dark-8)}
.list-header p{font-size:12px;color:var(--muted);margin-top:3px}
.list-tbl{width:100%;border-collapse:collapse;font-size:13px}
.list-tbl th{text-align:left;padding:9px 12px;border-bottom:2px solid var(--border);
  color:var(--muted);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.list-tbl td{padding:12px;border-bottom:1px solid var(--border-s);vertical-align:middle}
.list-tbl tbody tr:last-child td{border:none}
.list-tbl tbody tr:hover td{background:#f8fafc}
.thumb{width:50px;height:50px;object-fit:cover;border-radius:10px;
  background:var(--bg);border:1px solid var(--border-s)}
.badge{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-published,.badge-active{background:rgba(22,163,74,.12);color:#15803d}
.badge-draft{background:rgba(234,179,8,.11);color:#a16207}
.badge-archived,.badge-ended,.badge-paused{background:rgba(100,116,139,.1);color:var(--muted)}
.prog{height:6px;background:rgba(15,23,42,.08);border-radius:99px;overflow:hidden;margin-top:6px}
.prog span{display:block;height:100%;background:var(--kik);border-radius:99px;transition:.3s}

/* ── Drag handle ── */
.drag-handle{cursor:grab;color:#cbd5e1;font-size:16px;line-height:1;user-select:none;
  padding:0 4px;transition:.15s;touch-action:none}
.drag-handle:hover{color:var(--muted)}
.drag-handle:active{cursor:grabbing}
.drag-row.dragging{opacity:.4}
.drag-ghost{position:fixed;z-index:300;pointer-events:none;background:#fff;border-radius:12px;
  box-shadow:0 16px 40px rgba(15,23,42,.25);border:1px solid var(--acc);
  padding:12px 16px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:10px}
.drop-line{height:2px;background:var(--acc);box-shadow:0 0 0 2px var(--acc-m)}

/* ── Upload zone ── */
.upload-zone{border:2px dashed rgba(0,159,227,.3);border-radius:12px;padding:20px;
  text-align:center;cursor:pointer;transition:.2s;color:var(--muted);font-size:13px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:var(--acc-m)}
.upload-zone input[type=file]{display:none}
.cover-preview{max-width:150px;max-height:100px;border-radius:10px;margin-top:10px;
  object-fit:cover;display:block;border:1px solid var(--border)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:100;
  display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;
  backdrop-filter:blur(5px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:680px;
  box-shadow:0 40px 80px rgba(0,0,0,.22);padding:32px;margin:auto}
.modal h3{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;
  color:var(--dark-8);margin-bottom:24px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;
  padding-top:18px;border-top:1px solid var(--border)}

/* ── Toast ── */
.toast{position:fixed;right:20px;bottom:20px;background:var(--dark-8);color:#fff;
  padding:13px 20px;border-radius:12px;font-size:13px;font-weight:600;
  opacity:0;transform:translateY(10px);transition:.25s;z-index:200;
  box-shadow:0 8px 28px rgba(0,0,0,.22);pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast.err{background:var(--red)}

/* ── Audit ── */
.audit-tbl{width:100%;border-collapse:collapse;font-size:12px}
.audit-tbl td{padding:8px 10px;border-bottom:1px solid var(--border-s);color:var(--muted);vertical-align:top}
.audit-tbl td:first-child{white-space:nowrap;color:var(--txt);font-size:11.5px}
code{background:rgba(0,159,227,.1);color:var(--acc);padding:2px 7px;border-radius:6px;font-size:11.5px}
.sec-divider{height:1px;background:var(--border-s);margin:20px 0}

/* ── Preview mini cards ── */
.pvg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pvg-card{border:1px solid var(--border-s);border-radius:10px;overflow:hidden;background:#fff}
.pvg-card .pvg-thumb{height:54px;background:rgba(0,159,227,.08);display:flex;align-items:center;justify-content:center;font-size:20px;background-size:cover;background-position:center}
.pvg-card .pvg-meta{padding:7px 9px}
.pvg-card .pvg-title{font-size:11.5px;font-weight:700;color:var(--dark-8);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pvg-card .pvg-sub{font-size:9.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pvk-item{margin-bottom:13px}
.pvk-item .pvk-title{font-size:12px;font-weight:700;color:var(--dark-8)}
.pvk-item .pvk-nums{font-size:10px;color:var(--muted);margin:3px 0 5px}

/* ── Responsive ── */
@media(max-width:1100px){.preview-pane{position:fixed;top:0;right:0;bottom:0;z-index:50;box-shadow:-12px 0 40px rgba(0,0,0,.3)}}
@media(max-width:700px){
  .sidebar{display:none}
  .main-body{padding:16px}
  .row{flex-direction:column}
  .modal{padding:20px;border-radius:16px}
  .main-topbar{padding:12px 16px}
  .preview-pane{width:100vw}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap">
  <form id="loginForm" class="login-box">
    <div class="login-logo">
      <div class="login-dot"></div>
      <div class="login-title">Blue Ferret<small>Панель керування</small></div>
    </div>
    <p class="login-sub">Введіть пароль адміністратора</p>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="pw" autocomplete="current-password" required autofocus placeholder="••••••••">
    </div>
    <button type="submit" class="login-btn" id="loginBtn">Увійти</button>
    <p id="loginErr" class="login-err hidden"></p>
  </form>
</div>

<!-- APP -->
<div id="app" class="shell hidden">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-dot"></div>
      <div class="sb-name">Blue Ferret<small>CMS v3</small></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-footer">
      <a class="sb-site-link" href="/" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
        </svg>
        Відкрити сайт
      </a>
      <button class="sb-logout" id="logoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Вийти
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="main-topbar">
      <div class="breadcrumb">
        <span>Blue Ferret</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 18l6-6-6-6"/>
        </svg>
        <b id="pageTitle">Загальне</b>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" id="previewToggle">Превью ▸</button>
        <div id="settingsControls" class="topbar-right">
          <span class="saved-stamp" id="savedAt"></span>
          <span class="save-wrap" id="saveWrap">
            <button class="btn btn-primary btn-sm" id="saveBtn">Зберегти і опублікувати</button>
            <span class="save-dot"></span>
          </span>
        </div>
      </div>
    </div>
    <div class="main-body" id="panels"></div>
  </div>

  <!-- LIVE PREVIEW -->
  <aside class="preview-pane collapsed" id="previewPane">
    <div class="pv-head">
      <h3>Live Preview</h3>
      <span class="pv-tag" id="pvTag"></span>

</div>

<!-- MODAL -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="modalCancel">Скасувати</button>
      <button class="btn btn-danger btn-sm hidden" id="modalDelete">Видалити</button>
      <button class="btn btn-primary btn-sm" id="modalSave">Зберегти</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

const $ = (s, r = document) => r.querySelector(s);
let S = null, activeTab = 'general';
let gamesCache = [], kikCache = [];
let editingType = null, editingId = null;
let dirty = false;
let previewOpen = false;

// ── Sidebar nav config ──────────────────────────────────────────
const NAV = [
  { group: 'Сайт' },
  { id: 'general', label: 'Загальне', icon: '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>' },
  { id: 'homepage', label: 'Головна сторінка', icon: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
  { id: 'banner', label: 'Банер', icon: '<rect x="3" y="5" width="18" height="4" rx="1"/><rect x="3" y="13" width="18" height="8" rx="1"/>' },
  { id: 'maintenance', label: 'Тех. режим', icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' },
  { id: 'contacts', label: 'Контакти', icon: '<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.64A2 2 0 012 .98h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>' },
  { group: 'Контент' },
  { id: 'games', label: 'Ігри', badge: 'games', icon: '<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>' },
  { id: 'kik', label: 'КІК-проекти', badge: 'kik', icon: '<path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>' },
  { group: 'Просунуте' },
  { id: 'seo', label: 'SEO', icon: '<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>' },
  { id: 'integrations', label: 'Аналітика', icon: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>' },
  { id: 'appearance', label: 'Кастомний CSS', icon: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>' },
  { group: 'Система' },
  { id: 'audit', label: 'Журнал дій', icon: '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>' },
];

const SETTINGS_TABS = new Set(['general','homepage','banner','maintenance','contacts','seo','integrations','appearance']);
const PREVIEWABLE = new Set(['general','homepage','banner','maintenance','appearance','games','kik']);

// ── Utils ──────────────────────────────────────────────────────
function esc(x){return String(x??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg, isErr){
  const t = $('#toast');
  t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 2800);
}
async function api(method, url, body){
  const r = await fetch(url, {
    method,
    headers: body ? {'Content-Type':'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 401){ showLogin(); throw new Error('unauth'); }
  return r.json();
}
function setDirty(v){
  dirty = v;
  $('#saveWrap').classList.toggle('dirty', v);
}

// ── Sidebar render ─────────────────────────────────────────────
function renderSidebar(){
  $('#sbNav').innerHTML = NAV.map(item => {
    if (item.group) return `<div class="sb-group-label">${item.group}</div>`;
    let badge = '';
    if (item.badge === 'games') badge = `<span class="sb-badge">${gamesCache.length}</span>`;
    if (item.badge === 'kik') badge = `<span class="sb-badge">${kikCache.length}</span>`;
    return `<button class="sb-btn${item.id===activeTab?' active':''}" data-tab="${item.id}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${item.icon}</svg>
      ${item.label}${badge}
    </button>`;
  }).join('');
  $('#pageTitle').textContent = NAV.find(n=>n.id===activeTab)?.label || '';
}

$('#sbNav').addEventListener('click', e => {
  const b = e.target.closest('[data-tab]');
  if (b) switchTab(b.dataset.tab);
});

function switchTab(id){
  if (dirty && SETTINGS_TABS.has(activeTab)) collectSettings();
  activeTab = id;
  const isSettings = SETTINGS_TABS.has(id);
  $('#settingsControls').classList.toggle('hidden', !isSettings);
  // preview availability
  $('#previewToggle').classList.toggle('hidden', !PREVIEWABLE.has(id));
  renderSidebar();
  draw();
  if (previewOpen) renderPreview();
}

// ── Field helpers ──────────────────────────────────────────────
function field(label, note, inner){
  return `<div class="field"><label>${label}</label>${note?`<span class="note" style="margin-bottom:6px;display:block">${note}</span>`:''} ${inner}</div>`;
}
function input(path, val, type='text', ph=''){
  return `<input type="${type}" data-path="${path}" value="${esc(val)}" placeholder="${ph}">`;
}
function textarea(path, val, ph=''){
  return `<textarea data-path="${path}" placeholder="${ph}">${esc(val)}</textarea>`;
}
function toggle(path, val, lbl){
  return `<div class="switch-row"><input type="checkbox" class="switch-input" data-path="${path}"${val?' checked':''}><label class="switch-label">${lbl}</label></div>`;
}
function colorField(path, val){
  return `<div class="color-row"><input type="color" data-path="${path}" value="${val||'#009fe3'}"><input type="text" data-path="${path}" value="${esc(val)}"></div>`;
}
function selField(path, val, opts){
  return `<select data-path="${path}">${opts.map(o=>`<option value="${o.v}"${o.v===val?' selected':''}>${o.l}</option>`).join('')}</select>`;
}
function card(title, hint, body){
  return `<div class="card"><div class="card-head"><h2>${title}</h2>${hint?`<p>${hint}</p>`:''}</div>${body}</div>`;
}

// ── Settings panels (with inline previews) ─────────────────────
function renderSettings(id){
  const g=S.general||{}, b=S.banner||{}, m=S.maintenance||{}, c=S.contacts||{},
        seo=S.seo||{}, ig=S.integrations||{}, ap=S.appearance||{}, hp=S.homepage||{};
  switch(id){
    case 'general': return card('Загальні налаштування','Назва сайту, гасло, основний колір',
      field('Назва сайту','',input('general.siteTitle',g.siteTitle,'text','Blue Ferret'))+
      field('Гасло (підзаголовок)','',input('general.tagline',g.tagline,'text','Незалежне видавництво настільних ігор'))+
      field('Основний колір','CSS-змінна --bf-accent на всіх сторінках',colorField('general.primaryColor',g.primaryColor))+
      `<div class="inline-pv"><div class="inline-pv-label">Прев'ю кольору</div>
        <div class="pv-color-row">
          <div class="pv-color-dot" id="ip_colorDot" style="background:${esc(g.primaryColor||'#009fe3')}"></div>
          <div>
            <div class="pv-color-hex" id="ip_colorHex">${esc(g.primaryColor||'#009fe3')}</div>
            <div class="pv-color-sample" id="ip_colorSample" style="color:${esc(g.primaryColor||'#009fe3')}">${esc(g.siteTitle||'Blue Ferret')}</div>
          </div>
        </div></div>`);

    case 'homepage': return [
      card('Hero-секція','Головний заголовок і кнопка',
        field('Заголовок (h1)','Замінює статичний заголовок на головній сторінці',input('homepage.heroTitle',hp.heroTitle,'text','Blue Ferret'))+
        field('Підзаголовок','',input('homepage.heroSubtitle',hp.heroSubtitle,'text','Незалежне видавництво настільних ігор'))+
        `<div class="row">
          ${field('Текст кнопки CTA','',input('homepage.heroCta',hp.heroCta,'text','Переглянути ігри'))}
          ${field('Посилання кнопки','',input('homepage.heroCtaLink',hp.heroCtaLink,'url','/igry'))}
        </div>`+
        `<div class="inline-pv"><div class="inline-pv-label">Прев'ю hero</div>
          <div class="pv-hero">
            <h4 id="ip_hTitle">${esc(hp.heroTitle||g.siteTitle||'Blue Ferret')}</h4>
            <p id="ip_hSub">${esc(hp.heroSubtitle||g.tagline||'Незалежне видавництво настільних ігор')}</p>
            <span class="pv-cta" id="ip_hCta">${esc(hp.heroCta||'Переглянути ігри')}</span>
          </div></div>`),
      card('Секція "Про нас"','Опис видавництва',
        field('Текст','Відображається в блоці "Про нас" на головній',textarea('homepage.aboutText',hp.aboutText,'Ми — маленьке незалежне видавництво...'))),
      card('Анонс / Featured','Довільний блок перед іграми',
        field('Заголовок анонсу','',input('homepage.featureTitle',hp.featureTitle,'text',''))+
        field('Текст анонсу','',textarea('homepage.featureText',hp.featureText,''))+
        field('Посилання анонсу','',input('homepage.featureLink',hp.featureLink,'url',''))),
    ].join('');

    case 'banner': return card('Банер угорі сайту','Смужка над усіма сторінками, підтягується через runtime.js',
      field('','',toggle('banner.enabled',b.enabled,'Показувати банер'))+
      field('Текст банера','',input('banner.text',b.text,'text',''))+
      field('Посилання','необов\'язково',input('banner.link',b.link,'url','https://...'))+
      `<div class="row">
        ${field('Колір фону','',colorField('banner.bg',b.bg||'#009fe3'))}
        ${field('Колір тексту','',colorField('banner.fg',b.fg||'#ffffff'))}
      </div>`+
      `<div class="inline-pv"><div class="inline-pv-label">Прев'ю банера</div>
        <div class="pv-banner-strip" id="ip_banner" style="background:${esc(b.bg||'#009fe3')};color:${esc(b.fg||'#ffffff')}">${esc(b.text||'Текст банера з\'явиться тут')}</div>
      </div>`);

    case 'maintenance': return card('Режим технічного обслуговування','Повна заглушка поверх сайту',
      field('','',toggle('maintenance.enabled',m.enabled,'Увімкнути режим обслуговування'))+
      field('Повідомлення','',textarea('maintenance.message',m.message,'Сайт тимчасово на технічному обслуговуванні...'))+
      `<div class="inline-pv"><div class="inline-pv-label">Прев'ю заглушки</div>
        <div class="pv-maint"><div class="pv-otter">🦦</div><p id="ip_maint">${esc(m.message||'Сайт тимчасово на технічному обслуговуванні. Скоро повернемось!')}</p></div>
      </div>`);

    case 'contacts': return card('Контакти та соцмережі','Контактна інформація видавництва',
      field('Email','',input('contacts.email',c.email,'email','rogachovanika@gmail.com'))+
      `<div class="row">
        ${field('Telegram','',input('contacts.telegram',c.telegram,'url','https://t.me/...'))}
        ${field('Instagram','',input('contacts.instagram',c.instagram,'url','https://instagram.com/...'))}
      </div>`+
      `<div class="row">
        ${field('Facebook','',input('contacts.facebook',c.facebook,'url','https://facebook.com/...'))}
        ${field('X (Twitter)','',input('contacts.x',c.x,'url','https://x.com/...'))}
      </div>`);

    case 'seo': return card('SEO-налаштування','Мета-теги для пошукових систем',
      field('Title за замовчуванням','',input('seo.defaultTitle',seo.defaultTitle))+
      field('Description','',textarea('seo.defaultDescription',seo.defaultDescription))+
      field('OG-зображення (URL)','',input('seo.ogImage',seo.ogImage,'url','https://...'))+
      field('','',toggle('seo.noindex',seo.noindex,'Закрити сайт від індексації')));

    case 'integrations': return card('Аналітика та зовнішні скрипти','Google Analytics, Meta Pixel, etc.',
      field('Скрипти у &lt;head&gt;','вставляються на всіх сторінках',textarea('integrations.headScripts',ig.headScripts,'<!-- Google Analytics -->'))+
      field('Скрипти у &lt;body&gt;','',textarea('integrations.bodyScripts',ig.bodyScripts)));

    case 'appearance': return card('Кастомний CSS','Стилі застосовуються поверх сайту миттєво',
      field('CSS','',textarea('appearance.customCss',ap.customCss,'.hero-title { font-size: 3rem; }'))+
      `<div class="inline-pv"><div class="inline-pv-label">Прев'ю з накладеним CSS</div>
        <div class="pv-css-demo" id="ip_cssDemo">
          <h3 class="hero-title" style="font-family:'Libre Baskerville',serif;font-size:18px;color:#1e293b;margin-bottom:6px">Заголовок сторінки</h3>
          <p style="color:#64748b;font-size:13px">Абзац тексту для перегляду стилів.</p>
          <a href="#" class="bf-cta" style="display:inline-block;margin-top:10px;background:#009fe3;color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:700" onclick="return false">Кнопка</a>
        </div>
        <style id="ip_cssStyle">${ap.customCss||''}</style>
      </div>`);
  }
}

// ── Live inline-preview updates while typing ───────────────────
function updateInlinePreviews(path, val){
  const set = (sel, fn) => { const e = $(sel); if (e) fn(e); };
  switch(path){
    case 'general.primaryColor':
      set('#ip_colorDot', e=>e.style.background=val);
      set('#ip_colorHex', e=>e.textContent=val);
      set('#ip_colorSample', e=>e.style.color=val);
      break;
    case 'general.siteTitle':
      set('#ip_colorSample', e=>e.textContent=val||'Blue Ferret');
      set('#ip_hTitle', e=>{ if(!($('[data-path="homepage.heroTitle"]')||{}).value) e.textContent=val; });
      break;
    case 'banner.text': set('#ip_banner', e=>e.textContent=val||'Текст банера з\'явиться тут'); break;
    case 'banner.bg': set('#ip_banner', e=>e.style.background=val); break;
    case 'banner.fg': set('#ip_banner', e=>e.style.color=val); break;
    case 'homepage.heroTitle': set('#ip_hTitle', e=>e.textContent=val||(S.general&&S.general.siteTitle)||'Blue Ferret'); break;
    case 'homepage.heroSubtitle': set('#ip_hSub', e=>e.textContent=val||(S.general&&S.general.tagline)||''); break;
    case 'homepage.heroCta': set('#ip_hCta', e=>e.textContent=val||'Переглянути ігри'); break;
    case 'maintenance.message': set('#ip_maint', e=>e.textContent=val||'Сайт тимчасово на технічному обслуговуванні. Скоро повернемось!'); break;
    case 'appearance.customCss': set('#ip_cssStyle', e=>e.textContent=val); break;
  }
}

// ── Collect settings from DOM ──────────────────────────────────
function collectSettings(){
  document.querySelectorAll('[data-path]').forEach(el => {
    const parts = el.dataset.path.split('.');
    const [k, f] = parts;
    if (!S[k]) S[k] = {};
    if (el.type === 'checkbox') S[k][f] = el.checked;
    else S[k][f] = el.value;
  });
}

// ── Games panel ────────────────────────────────────────────────
function renderGames(){
  const rows = gamesCache.length
    ? gamesCache.map(g=>`
      <tr class="drag-row" data-id="${g.id}">
        <td style="width:26px"><span class="drag-handle" data-drag="game" title="Перетягніть для зміни порядку">⠿</span></td>
        <td>${g.cover_url?`<img class="thumb" src="${esc(g.cover_url)}" loading="lazy" onerror="this.style.opacity='.2'">`:
          `<div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">🎲</div>`}</td>
        <td>
          <div style="font-weight:700">${esc(g.title)}</div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${esc(g.slug)}</div>
        </td>
        <td><span class="badge badge-${g.status}">${g.status}</span></td>
        <td style="color:var(--muted);font-size:12px">${[g.players,g.age,g.duration].filter(Boolean).join(' · ')||'—'}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openGameModal(${g.id})">Редагувати</button></td>
      </tr>`).join('')
    : `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted)">Ігор ще немає — додайте першу</td></tr>`;
  return `<div class="card">
    <div class="list-header">
      <div><h2>Каталог ігор</h2><p>Усі ігри Blue Ferret, ${gamesCache.length} шт. Перетягуйте за ⠿ для зміни порядку.</p></div>
      <button class="btn btn-primary btn-sm" onclick="openGameModal(null)">+ Додати гру</button>
    </div>
    <table class="list-tbl">
      <thead><tr><th></th><th style="width:60px"></th><th>Назва</th><th>Статус</th><th>Характеристики</th><th style="width:120px"></th></tr></thead>
      <tbody id="gamesBody">${rows}</tbody>
    </table>
  </div>`;
}

function openGameModal(id){
  editingType = 'game'; editingId = id;
  const g = id ? gamesCache.find(x=>x.id===id) : {};
  $('#modalTitle').textContent = id ? `Редагувати: ${g.title}` : 'Нова гра';
  $('#modalDelete').classList.toggle('hidden', !id);
  const coverPrev = g.cover_url ? `<img class="cover-preview" src="${esc(g.cover_url)}" id="coverPreview">` : `<div id="coverPreview"></div>`;
  const descLen = (g.description||'').length;
  $('#modalBody').innerHTML = `
    <div class="row">
      ${field('Назва','',`<input type="text" id="mf_title" value="${esc(g.title||'')}" required>`)}
      ${field('Slug','Латиниця, дефіс. Згенерується з назви, якщо порожній',`<input type="text" id="mf_slug" value="${esc(g.slug||'')}" placeholder="trymaysia">`)}
    </div>
    ${field('Підзаголовок','',`<input type="text" id="mf_subtitle" value="${esc(g.subtitle||'')}">`)}
    ${field('Опис','макс. 500 символів',`<textarea id="mf_description" maxlength="600" style="min-height:90px">${esc(g.description||'')}</textarea><div class="char-counter${descLen>500?' over':''}" id="mf_descCount">${descLen} / 500</div>`)}
    <div class="row">
      ${field('Статус','',`<select id="mf_status">
        <option value="published"${(g.status||'published')==='published'?' selected':''}>published</option>
        <option value="draft"${g.status==='draft'?' selected':''}>draft</option>
        <option value="archived"${g.status==='archived'?' selected':''}>archived</option>
      </select>`)}
      ${field('Порядок сортування','',`<input type="number" id="mf_sort_order" value="${g.sort_order||0}">`)}
    </div>
    ${field('Обкладинка','URL або завантажте файл',`
      <input type="url" id="mf_cover_url" value="${esc(g.cover_url||'')}" placeholder="https://...">
      <div class="upload-zone" id="uploadZone" style="margin-top:8px" onclick="$('#mf_file').click()">
        <input type="file" id="mf_file" accept="image/*">
        <div>Клацніть або перетягніть зображення</div>
      </div>
      ${coverPrev}
    `)}

function setupGameModalAids(){
  const title = $('#mf_title'), slug = $('#mf_slug');
  const desc = $('#mf_description'), count = $('#mf_descCount');
  const coverUrl = $('#mf_cover_url');
  // slug auto-gen from title if slug empty
  if (title && slug){
    title.addEventListener('input', () => {
      if (!slug.value.trim() || slug.dataset.auto === '1'){
        slug.dataset.auto = '1';
        slug.value = slugify(title.value);
      }
    });
    slug.addEventListener('input', () => { slug.dataset.auto = ''; });
  }
  // char counter
  if (desc && count){
    desc.addEventListener('input', () => {
      const n = desc.value.length;
      count.textContent = n + ' / 500';
      count.classList.toggle('over', n > 500);
    });
  }
  // cover preview on url change
  if (coverUrl){
    coverUrl.addEventListener('input', () => { if (coverUrl.value.trim()) showCoverPreview(coverUrl.value.trim()); });
  }
}

function slugify(s){
  return String(s||'').toLowerCase().trim()
    .replace(/[^a-zа-яіїєґ0-9]+/gi,'-').replace(/^-|-$/g,'');
}

function setupUploadZone(){
  const zone = $('#uploadZone');
  const fileInput = $('#mf_file');
  if (!zone || !fileInput) return;
  fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
  });
}

async function uploadFile(file){
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const r = await api('POST', '/api/admin/upload', { filename: file.name, data: e.target.result });
      if (r.url){ $('#mf_cover_url').value = r.url; showCoverPreview(r.url); toast('Завантажено ✓'); }
      else toast('Помилка завантаження', true);
    } catch(_){ toast('Помилка завантаження', true); }
  };
  reader.readAsDataURL(file);
}

function showCoverPreview(url){
  let p = $('#coverPreview');
  if (!p) return;
  if (p.tagName === 'IMG'){ p.src = url; }
  else { p.outerHTML = `<img class="cover-preview" id="coverPreview" src="${esc(url)}">`; }
}

// ── Drag and drop reorder (pure JS) ────────────────────────────
let drag = null;

document.addEventListener('mousedown', e => {
  const handle = e.target.closest('[data-drag]');
  if (!handle) return;
  e.preventDefault();
  const row = handle.closest('.drag-row');
  if (!row) return;
  const tbody = row.parentNode;
  const type = handle.dataset.drag;
  const rows = Array.from(tbody.querySelectorAll('.drag-row'));
  drag = { type, row, tbody, rows, startY: e.clientY, ghost: null, moved: false };
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', e => {
  if (!drag) return;
  if (!drag.moved && Math.abs(e.clientY - drag.startY) < 4) return;
  drag.moved = true;
  drag.row.classList.add('dragging');
  // ghost
  if (!drag.ghost){
    drag.ghost = document.createElement('div');
    drag.ghost.className = 'drag-ghost';
    const titleCell = drag.row.querySelector('td:nth-child(3)');
    drag.ghost.innerHTML = `<span class="drag-handle">⠿</span>${titleCell ? titleCell.querySelector('div').textContent : 'Елемент'}`;
    document.body.appendChild(drag.ghost);
  }
  drag.ghost.style.left = (e.clientX + 12) + 'px';
  drag.ghost.style.top = (e.clientY - 12) + 'px';
  // determine insertion point
  const others = drag.rows.filter(r => r !== drag.row);
  let placed = false;
  for (const r of others){
    const rect = r.getBoundingClientRect();
    if (e.clientY < rect.top + rect.height/2){
      drag.tbody.insertBefore(drag.row, r);
      placed = true;
      break;
    }
  }
  if (!placed) drag.tbody.appendChild(drag.row);
});

document.addEventListener('mouseup', async () => {
  if (!drag) return;
  const d = drag; drag = null;
  document.body.style.userSelect = '';
  if (d.ghost) d.ghost.remove();
  d.row.classList.remove('dragging');
  if (!d.moved) return;
  // new order
  const ids = Array.from(d.tbody.querySelectorAll('.drag-row')).map(r => Number(r.dataset.id));
  try {
    if (d.type === 'game'){
      await Promise.all(ids.map((id, i) => api('PUT', `/api/admin/games/${id}`, { sort_order: i })));
      gamesCache = await api('GET','/api/admin/games');
    } else {
      await Promise.all(ids.map((id, i) => api('PUT', `/api/admin/kik/${id}`, { sort_order: i })));
      kikCache = await api('GET','/api/admin/kik');
    }
    toast('Порядок збережено ✓');
    if (previewOpen) renderPreview();
  } catch(e){ if (e.message !== 'unauth') toast('Помилка зміни порядку', true); }
});

    html = `<div class="pv-empty">Прев'ю недоступне для цієї вкладки<div class="pv-hint">Оберіть Загальне, Головна, Банер, Тех. режим, CSS, Ігри або КІК</div></div>`;
  }

  body.innerHTML = html + `<div class="pv-hint">Орієнтовний вигляд. Натисніть «Зберегти», щоб опублікувати.</div>`;
}

// ── Save settings ──────────────────────────────────────────────
$('#saveBtn').addEventListener('click', saveSettings);

async function saveSettings(){
  if (!SETTINGS_TABS.has(activeTab)) return;
  collectSettings();
  $('#saveBtn').disabled = true;
  try {
    const res = await api('PUT', '/api/admin/settings', S);
    S = res.settings;
    setDirty(false);
    toast('Збережено і опубліковано ✓');
    stamp();
    if (previewOpen) renderPreview();
  } catch(e){ if (e.message !== 'unauth') toast('Помилка збереження', true); }
  finally { $('#saveBtn').disabled = false; }
}

// Cmd/Ctrl+S
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && (e.key === 's' || e.key === 'S')){
    e.preventDefault();
    if ($('#app').classList.contains('hidden')) return;
    if (SETTINGS_TABS.has(activeTab)) saveSettings();
  }
});

function stamp(){
  const t = S?.general?.publishedAt;
  $('#savedAt').textContent = t ? 'Опубліковано: ' + new Date(t).toLocaleString('uk-UA') : '';
}

// ── Audit ──────────────────────────────────────────────────────
async function loadAudit(){
  try {
    const rows = await api('GET','/api/admin/audit');
    const box = $('#auditBox');
    if (!box) return;
    box.innerHTML = rows.length
      ? `<table class="audit-tbl">${rows.map(r=>`<tr>
          <td>${new Date(r.ts).toLocaleString('uk-UA')}</td>
          <td><code>${esc(r.action)}</code></td>
          <td>${esc(r.ip||'')}</td>
          <td style="max-width:240px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(r.detail||'')}</td>
        </tr>`).join('')}</table>`
      : '<p style="color:var(--muted)">Журнал порожній</p>';
  } catch(e){}
}

// ── Auth ───────────────────────────────────────────────────────
function showApp(){ $('#login').classList.add('hidden'); $('#app').classList.remove('hidden'); }
function showLogin(){ $('#app').classList.add('hidden'); $('#login').classList.remove('hidden'); $('#pw').value=''; setTimeout(()=>$('#pw').focus(),50); }

$('#loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  $('#loginBtn').disabled = true;
  $('#loginErr').classList.add('hidden');
  try {
    const r = await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('#pw').value})});
    if (r.ok){ await boot(); }
    else {
      const j = await r.json().catch(()=>({}));
      $('#loginErr').textContent = j.error==='too_many_attempts' ? 'Забагато спроб. Зачекайте 10 хвилин.' : 'Невірний пароль';
      $('#loginErr').classList.remove('hidden');
    }
  } catch(e){ $('#loginErr').textContent='Помилка з\'єднання'; $('#loginErr').classList.remove('hidden'); }
  finally { $('#loginBtn').disabled = false; }
});

$('#logoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin/logout',{method:'POST'}).catch(()=>{});
  toast('Ви вийшли з системи');
  setTimeout(showLogin, 300);
});

// ── Boot ───────────────────────────────────────────────────────
async function boot(){
  try {
    const me = await fetch('/api/admin/me').then(r=>r.json()).catch(()=>({authenticated:false}));
    if (!me.authenticated){ showLogin(); return; }
    [S, gamesCache, kikCache] = await Promise.all([
      api('GET','/api/admin/settings'),
      api('GET','/api/admin/games'),
      api('GET','/api/admin/kik'),
    ]);
    showApp();
    renderSidebar();
    switchTab(activeTab);
    stamp();
    setDirty(false);
  } catch(e){ showLogin(); }
}
boot();
</script>
</body>
