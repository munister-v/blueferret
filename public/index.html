    <div class="m-lbl">
      <div class="fn">${esc(f.filename.replace(/-\d{13}(\.[^.]+)$/,'$1'))}</div>
      <div class="sz">${fmtSz(f.size)}</div>
    </div>
  </div>`).join(''):`<div style="color:var(--txt-m);padding:40px;text-align:center">Поки що файлів немає — завантажте перший!</div>`;

  $('#mainContent').innerHTML=`<div class="card">
    <div class="ch">
      <div><div class="ct">🖼 Медіа-бібліотека</div><div class="cs">${mediaList.length} файлів</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-g btn-sm" onclick="$('#fInp').click()">+ Завантажити</button>
      </div>
    </div>

    <div class="upload-z" id="upZ" style="margin-bottom:16px">
      <input type="file" id="fInp" multiple accept="image/*" style="display:none">
      <p style="color:var(--txt-m)">Перетягніть зображення або <a href="#" onclick="$('#fInp').click();return false">виберіть файли</a></p>
      <p style="font-size:11.5px;color:var(--txt-s);margin-top:4px">PNG, JPG, WebP, GIF, SVG · до 10 МБ · кілька файлів одразу</p>
    </div>
    <div id="upProgress" style="display:none;margin-bottom:14px"></div>

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <div style="position:relative;flex:1;min-width:200px">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt-s);font-size:14px">🔍</span>
        <input type="text" id="mediaSearch" placeholder="Пошук файлів…" style="padding-left:36px" oninput="filterMedia(this.value)" value="${esc(mediaFilter)}">
      </div>
      <div class="sort-bar">Сортування:
        <button class="sort-btn${mediaSort==='date'?' on':''}" onclick="mediaSort='date';renderMedia()">Нові</button>
        <button class="sort-btn${mediaSort==='size'?' on':''}" onclick="mediaSort='size';renderMedia()">Розмір</button>
        <button class="sort-btn${mediaSort==='name'?' on':''}" onclick="mediaSort='name';renderMedia()">Назва</button>
      </div>
      <span style="color:var(--txt-m);font-size:12px;white-space:nowrap" id="mediaCount">${mediaList.length} файлів</span>
    </div>
    <div style="display:flex;gap:16px;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div class="m-grid" id="mediaGrid">${grid}</div>
      </div>
      <div id="mediaInfoPanel" class="media-info" style="width:220px;flex-shrink:0"></div>
    </div>
  </div>
  <div id="lightboxEl" class="lightbox hidden" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="">
  </div>`;

  const z=$('#upZ'),inp=$('#fInp');if(!z||!inp)return;
  inp.addEventListener('change',()=>upFiles([...inp.files]));
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
  z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag');upFiles([...e.dataTransfer.files]);});
  // restore selection
  if(selectedMedia){const m=mediaList.find(f=>f.filename===selectedMedia);if(m)showMediaInfo(m);}
}

function selectMedia(fn,url,size){
  selectedMedia=fn;
  // update UI selection
  $$('.m-i').forEach(el=>el.classList.toggle('sel',el.dataset.fn===fn));
  const m=mediaList.find(f=>f.filename===fn);
  if(m)showMediaInfo(m);
}

function showMediaInfo(f){
  const panel=$('#mediaInfoPanel');if(!panel)return;
  panel.classList.add('show');
  const shortName=f.filename.replace(/-\d{13}(\.[^.]+)$/,'$1');
  const ext=f.filename.split('.').pop().toUpperCase();
  panel.innerHTML=`
    <img src="${esc(f.url)}" onerror="this.style.display='none'" onclick="openLightbox('${jsq(f.url)}')" style="cursor:zoom-in">
    <div class="info-row"><span class="lbl">Назва</span><span class="val" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(shortName)}</span></div>
    <div class="info-row"><span class="lbl">Розмір</span><span class="val">${fmtSz(f.size)}</span></div>
    <div class="info-row"><span class="lbl">Тип</span><span class="val">${ext}</span></div>
    <div class="info-row"><span class="lbl">Дата</span><span class="val">${new Date(f.mtime).toLocaleDateString('uk-UA')}</span></div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:12px">
      <button class="btn btn-p btn-sm" style="width:100%" onclick="copyUrl('${jsq(f.url)}')">📋 Копіювати URL</button>
      <button class="btn btn-g btn-sm" style="width:100%" onclick="openLightbox('${jsq(f.url)}')">🔍 Повний перегляд</button>
      <button class="btn btn-sm" style="width:100%;background:#fef2f2;color:var(--red);border:1px solid #fecaca" onclick="delMedia('${jsq(f.filename)}')">🗑 Видалити</button>
    </div>`;
}

function openLightbox(url){
  const lb=$('#lightboxEl'),img=$('#lightboxImg');
  if(!lb||!img)return;
  img.src=url; lb.classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  const lb=$('#lightboxEl');if(lb)lb.classList.add('hidden');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

async function upFiles(files){
  const prog=$('#upProgress');
  if(prog){prog.style.display='';prog.innerHTML=`<div style="color:var(--txt-m);font-size:13px">Завантаження ${files.length} файл(ів)…</div><div style="height:4px;background:var(--line);border-radius:99px;margin-top:8px;overflow:hidden"><div id="upBar" style="height:100%;background:var(--bf);border-radius:99px;width:0%;transition:.3s"></div></div>`;}
  let ok=0;
  for(let i=0;i<files.length;i++){
    const fd=new FormData();fd.append('file',files[i]);
    try{await api('POST','/api/admin/upload',fd);ok++;}catch(e){toast(files[i].name+': '+e.message,'er');}
    const bar=$('#upBar');if(bar)bar.style.width=Math.round((i+1)/files.length*100)+'%';
  }
  if(ok)toast(`Завантажено ${ok} з ${files.length} файлів ✓`,'ok');
  if(prog)setTimeout(()=>{prog.style.display='none';prog.textContent='';},900);
  await renderMedia();
}
async function delMedia(fn){
  if(!confirm(`Видалити ${fn.replace(/-\d{13}(\.[^.]+)$/,'$1')}?`))return;
  try{
    await api('DELETE',`/api/admin/media/${fn}`);
    if(selectedMedia===fn)selectedMedia=null;
    toast('Видалено','ok');await renderMedia();
  }catch(e){toast(e.message,'er');}
}
function copyUrl(url){
  const full=location.origin+url;
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(full).then(()=>toast('URL скопійовано ✓')).catch(()=>fallbackCopy(full));
  else fallbackCopy(full);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('URL скопійовано ✓');}catch{toast(text,'i');}
  ta.remove();
}
function filterMedia(q){
  mediaFilter=q.toLowerCase();
  const grid=$('#mediaGrid'),cnt=$('#mediaCount');
  if(!grid)return;
  const filtered=mediaList.filter(f=>f.filename.toLowerCase().includes(mediaFilter));
  if(cnt)cnt.textContent=`${filtered.length} / ${mediaList.length} файлів`;
  grid.innerHTML=filtered.length?filtered.map(f=>`<div class="m-i${selectedMedia===f.filename?' sel':''}" data-fn="${esc(f.filename)}" data-url="${esc(f.url)}" onclick="selectMedia('${jsq(f.filename)}','${jsq(f.url)}',${f.size})">
    <div class="m-i-img">
      <img src="${esc(f.url)}" loading="lazy" onerror="this.style.opacity='.3'">
      <div class="m-ov">
        <button onclick="event.stopPropagation();openLightbox('${jsq(f.url)}')">🔍 Переглянути</button>
        <button onclick="event.stopPropagation();copyUrl('${jsq(f.url)}')">📋 Копіювати URL</button>
        <button class="del" onclick="event.stopPropagation();delMedia('${jsq(f.filename)}')">🗑 Видалити</button>
      </div>
    </div>
    <div class="m-lbl">
      <div class="fn">${esc(f.filename.replace(/-\d{13}(\.[^.]+)$/,'$1'))}</div>
      <div class="sz">${fmtSz(f.size)}</div>
    </div>
  </div>`).join(''):`<div style="color:var(--txt-m);padding:32px;text-align:center">Нічого не знайдено</div>`;
}
window.filterMedia=filterMedia;
window.delMedia=delMedia;window.copyUrl=copyUrl;window.selectMedia=selectMedia;window.openLightbox=openLightbox;window.closeLightbox=closeLightbox;

// ── MEDIA PICKER ──
function openPickerFor(targetId, cb){
  pickerCallback=(url)=>{if(targetId){const el=document.getElementById(targetId);if(el)el.value=url;}if(cb)cb(url);};
  api('GET','/api/admin/media').then(list=>{
    mediaList=list;
    $('#pickerBody').innerHTML=list.length
      ?`<div class="m-grid">${list.map(f=>`<div class="m-i" onclick="pickMedia('${jsq(f.url)}')" style="cursor:pointer">
          <img src="${esc(f.url)}" loading="lazy">
          <div class="m-ov"><button>Вибрати</button></div>
          <div class="m-lbl">${fmtSz(f.size)}</div>
        </div>`).join('')}</div>`
      :`<p style="color:var(--txt-m);text-align:center;padding:32px">Медіабібліотека порожня — завантажте фото у розділі Медіа</p>`;
    $('#pickerModal').classList.remove('hidden');
  }).catch(()=>{});
}
function pickMedia(url){if(pickerCallback){pickerCallback(url);pickerCallback=null;}closePicker();}
function closePicker(){$('#pickerModal').classList.add('hidden');pickerCallback=null;}
window.openPickerFor=openPickerFor;window.pickMedia=pickMedia;window.closePicker=closePicker;

// ── SECURITY ──
function renderSecurity(){
  return `<div class="card">
    <div class="ch"><div><div class="ct">🔑 Зміна пароля</div><div class="cs">Мінімум 8 символів</div></div></div>
    <div class="field"><label class="flbl">Поточний пароль</label><input type="password" id="sc" autocomplete="current-password"></div>
    <div class="field"><label class="flbl">Новий пароль</label><input type="password" id="sn" autocomplete="new-password"></div>
    <div class="field"><label class="flbl">Підтвердити</label><input type="password" id="sf"></div>
    <div style="display:flex;gap:12px;align-items:center">
      <button class="btn btn-p" onclick="chgPass()">Змінити</button>
      <span id="smsg" style="font-size:13px"></span>
    </div></div>`;
}
async function chgPass(){
  const c=$('#sc')?.value,n=$('#sn')?.value,f=$('#sf')?.value,msg=$('#smsg');
  if(!c||!n||!f){if(msg){msg.style.color='var(--red)';msg.textContent='Заповніть усі поля';}return;}
  if(n!==f){if(msg){msg.style.color='var(--red)';msg.textContent='Паролі не збігаються';}return;}
  try{await api('POST','/api/admin/password',{current:c,next:n});if(msg){msg.style.color='var(--kik)';msg.textContent='Пароль змінено ✓';}toast('Пароль змінено ✓','ok');}
  catch(e){if(e.message!=='unauth'&&msg){msg.style.color='var(--red)';msg.textContent=e.message==='wrong_current'?'Невірний поточний пароль':'Помилка';}}
}
window.chgPass=chgPass;

// ── AUDIT ──
const AUDIT_CFG={
  login_ok:    {ico:'🔑',bg:'rgba(99,102,241,.12)',color:'#6366f1'},
  login_fail:  {ico:'⚠️',bg:'rgba(239,68,68,.1)', color:'#ef4444'},
  settings_save:{ico:'⚙️',bg:'rgba(0,159,227,.1)',color:  'var(--bf)'},
  game_create: {ico:'🎲',bg:'rgba(0,159,227,.1)', color:'var(--bf)'},
  game_update: {ico:'✏️',bg:'rgba(99,102,241,.1)',color:'#6366f1'},
  game_delete: {ico:'🗑',bg:'rgba(239,68,68,.1)', color:'#ef4444'},
  kik_create:  {ico:'🚀',bg:'rgba(75,178,114,.1)',color:'var(--kik)'},
  kik_update:  {ico:'📊',bg:'rgba(75,178,114,.1)',color:'var(--kik)'},
  kik_delete:  {ico:'🗑',bg:'rgba(239,68,68,.1)', color:'#ef4444'},
  page_patch:  {ico:'📄',bg:'rgba(251,191,36,.1)',color:'#d97706'},
  page_edit:   {ico:'📝',bg:'rgba(251,191,36,.1)',color:'#d97706'},
  upload:      {ico:'🖼',bg:'rgba(75,178,114,.1)',color:'var(--kik)'},
  media_delete:{ico:'🗑',bg:'rgba(239,68,68,.1)', color:'#ef4444'},
  password_change:{ico:'🔐',bg:'rgba(99,102,241,.1)',color:'#6366f1'},
};
async function renderAudit(){
  const rows=await api('GET','/api/admin/audit');
  const body=rows.length?rows.map(r=>{
    const cfg=AUDIT_CFG[r.action]||{ico:'📋',bg:'#f1f5f9',color:'var(--txt-m)'};
    let detail='';
    try{const d=JSON.parse(r.detail||'null');if(d)detail=typeof d==='object'?Object.entries(d).map(([k,v])=>`${k}: ${v}`).join(', '):String(d);}catch{}
    return`<tr>
      <td style="white-space:nowrap;color:var(--txt-s)">${relT(r.ts)}<br><span style="font-size:10px">${fmtD(r.ts).split(',')[1]||''}</span></td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <span class="aico" style="background:${cfg.bg}">${cfg.ico}</span>
        <span style="font-weight:600;color:${cfg.color};font-size:13px">${r.action}</span>
      </div></td>
      <td style="color:var(--txt-s);font-size:12px">${esc(r.ip||'—')}</td>
      <td style="max-width:240px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:12px;color:var(--txt-m)">${esc(detail)}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--txt-m)">Журнал порожній</td></tr>`;
  return `<div class="card">
    <div class="ch"><div><div class="ct">📋 Журнал дій</div><div class="cs">Останні 200 записів</div></div>
      <button class="btn btn-g btn-sm" onclick="render()" title="Оновити">↻ Оновити</button>
    </div>
    <table class="at"><thead><tr><th>Час</th><th>Дія</th><th>IP</th><th>Деталі</th></tr></thead><tbody>${body}</tbody></table></div>`;
}

// ── AUTH ──
function showLogin(){$('#loginPage').classList.remove('hidden');$('#appPage').classList.add('hidden');$('#pw').value='';setTimeout(()=>$('#pw').focus(),80);}
function showApp(){$('#loginPage').classList.add('hidden');$('#appPage').classList.remove('hidden');}

function togglePw(){const i=$('#pw');const b=$('#pwToggle');if(!i)return;if(i.type==='password'){i.type='text';b.textContent='🙈';}else{i.type='password';b.textContent='👁';}}
window.togglePw=togglePw;

$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault();$('#loginBtn').disabled=true;$('#loginErr').classList.add('hidden');
  const ctl=new AbortController();
  const tid=setTimeout(()=>ctl.abort(),15000);
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',signal:ctl.signal,
      body:JSON.stringify({password:$('#pw').value,remember:$('#rememberMe')?.checked||false})});
    if(r.ok){
      if($('#rememberMe')?.checked)localStorage.setItem('bf_remember','1');
      await boot();
    }else{const j=await r.json().catch(()=>({}));$('#loginErr').textContent=j.error==='too_many_attempts'?'Забагато спроб — зачекайте 10 хв':'Невірний пароль';$('#loginErr').classList.remove('hidden');}
  }catch(err){
    $('#loginErr').textContent=err.name==='AbortError'?'Сервер відповідає занадто довго':'Сервер тимчасово недоступний';
    $('#loginErr').classList.remove('hidden');
  }finally{clearTimeout(tid);$('#loginBtn').disabled=false;}
});
// restore remember state
if(localStorage.getItem('bf_remember')==='1'&&$('#rememberMe'))$('#rememberMe').checked=true;

$('#logoutBtn').addEventListener('click',async()=>{
  await fetch('/api/admin/logout',{method:'POST'});
  localStorage.removeItem('bf_remember');
  showLogin();
});

// ── SCROLL TO TOP ──
document.addEventListener('scroll',()=>{
  const btn=$('#scrollTop');if(btn)btn.classList.toggle('show',window.scrollY>300);
},true);
document.getElementById('mainContent').addEventListener('scroll',e=>{
  const btn=$('#scrollTop');if(btn)btn.classList.toggle('show',e.target.scrollTop>300);
});

// ── TAB PERSISTENCE ──
function saveTab(t){try{localStorage.setItem('bf_tab',t);}catch{}}
function loadTab(){try{return localStorage.getItem('bf_tab')||'dashboard';}catch{return'dashboard';}}
$('#sidebar').addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(b)saveTab(b.dataset.tab);});

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown',e=>{
  // Cmd+S / Ctrl+S → save
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){
    e.preventDefault();
    if(activeTab==='pages'&&activePage){savePatchedPage?.();}
    else if(STABS.has(activeTab)){$('#saveBtn')?.click();}
    else if(activeTab==='game-editor'){saveGame?.();}
    else if(activeTab==='kik-editor'){saveKik?.();}
  }
  // Escape → close editors
  if(e.key==='Escape'){
    if(activeTab==='pages'&&activePage){closePagesEditor?.();}
    else if(activeTab==='game-editor'){backToGames?.();}
    else if(activeTab==='kik-editor'){backToKik?.();}
  }
});

window.addEventListener('beforeunload',e=>{
  const hasPageEdits=pageEdited&&Object.keys(pageEdited).length;
  const hasSiteEdits=siteEdited&&Object.keys(siteEdited).length;
  if(hasPageEdits||hasSiteEdits||editorDirty){e.preventDefault();e.returnValue='';}
});

// ── MEDIA SEARCH ──
let mediaFilter='';
const origRenderMedia=renderMedia;
// We patch renderMedia to support search after it's defined — done inline in renderMedia instead.

// ── AUTO-RESIZE textareas after render ──
function autoResizeAll(){
  $$('textarea.code, .blk textarea').forEach(t=>{if(t.style.height)return;t.style.height='auto';t.style.height=t.scrollHeight+'px';});
}
// observe DOM changes to auto-resize
const resizeObs=new MutationObserver(()=>autoResizeAll());
resizeObs.observe(document.getElementById('mainContent'),{childList:true,subtree:true});

async function boot(){
  try{
    const ctl=new AbortController();
    const tid=setTimeout(()=>ctl.abort(),12000);
    const me=await fetch('/api/admin/me',{credentials:'same-origin',signal:ctl.signal}).then(r=>r.json()).catch(()=>({authenticated:false})).finally(()=>clearTimeout(tid));
    if(!me.authenticated){showLogin();return;}
    [S,games,kik]=await Promise.all([api('GET','/api/admin/settings'),api('GET','/api/admin/games'),api('GET','/api/admin/kik')]);
    activeTab=loadTab();
    showApp();render();
  }catch(e){
    showLogin();
    const err=$('#loginErr');if(err)err.textContent=e.message||'CMS тимчасово недоступна';
  }
}
boot();
</script>
